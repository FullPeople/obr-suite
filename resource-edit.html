<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>编辑资源</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1d2030;--bg-strong:#13151f;--bg-card:#262a3a;--bg-elev:#2e3346;
  --border:rgba(255,255,255,0.10);--border-strong:rgba(255,255,255,0.20);
  --text:#e6e8ee;--text-dim:#9aa0b3;--text-mute:#5a6075;
  --accent:#5dade2;--accent-warm:#f5a623;--accent-red:#e74c3c;--accent-green:#2ecc71;
}
html,body{
  height:100%;width:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:var(--text);background:rgba(0,0,0,0.55);
  font-size:13px;
  display:flex;align-items:center;justify-content:center;
}

/* ===== modal card — modern square design (zero rounded corners) ===== */
.card{
  width:min(440px, 92vw);
  max-height:90vh;
  background:var(--bg);
  border:1px solid var(--border-strong);
  border-radius:0;
  box-shadow:0 14px 40px rgba(0,0,0,0.6);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.hdr{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;
  background:var(--bg-strong);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.hdr .ttl{font-size:14px;font-weight:700;flex:1;letter-spacing:0.3px}
.hdr .x{
  cursor:pointer;font-size:18px;color:var(--text-dim);line-height:1;
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid transparent;border-radius:0;
  font-family:inherit;
  transition:color .12s, background .12s, border-color .12s;
}
.hdr .x:hover{color:#fff;background:rgba(231,76,60,0.22);border-color:var(--accent-red)}

.body{
  flex:1;min-height:0;overflow-y:auto;
  padding:14px 16px;
  display:flex;flex-direction:column;gap:11px;
}
.body::-webkit-scrollbar{width:6px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12)}

/* labelled fields */
label.field, .field{
  display:flex;flex-direction:column;gap:4px;
}
.field > span:first-child, .lbl{
  font-size:10.5px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:.5px;font-weight:700;
}
.field input[type=text],
.field input[type=number],
.field select{
  height:32px;padding:0 10px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:0;
  color:var(--text);font-size:13px;outline:none;
  font-family:inherit;
  transition:border-color .12s, background .12s;
}
.field input:focus,.field select:focus{
  border-color:var(--accent);
  background:#171a26;
}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ===== type toggle (个数 / 进度 / 数字) ===== */
.type-toggle{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  height:32px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:0;
  overflow:hidden;
}
.type-toggle button{
  background:transparent;border:none;
  color:var(--text-dim);
  font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;letter-spacing:0.4px;
  transition:background .12s, color .12s;
}
.type-toggle button:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.type-toggle button.on{
  background:rgba(93,173,226,0.22);
  color:#7ec8f0;
  box-shadow:inset 0 -2px 0 0 var(--accent);
}
.type-toggle button + button{border-left:1px solid var(--border)}

/* ===== icon grid — seamless square highlights, no gap, no per-cell radius =====
   gap:0 + the host-grid border + each cell's right/bottom border draws a
   uniform 1px lattice. The selection is a solid accent fill that snaps
   exactly to the cell box — gapless, square, "modern". */
.icon-grid{
  display:grid;grid-template-columns:repeat(8, 1fr);gap:0;
  max-height:208px;overflow-y:auto;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:0;
}
.icon-grid::-webkit-scrollbar{width:6px}
.icon-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16)}
.icon-pick{
  height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  background:transparent;
  border:0;
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  border-radius:0;
  color:var(--text-dim);
  transition:background .08s, color .08s;
}
.icon-pick:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.icon-pick.on{
  background:var(--accent);
  color:#0b1320;
  /* knock out the lattice line under the active cell so it reads as a
     single seamless tile (the next-row cell's top border doesn't exist;
     this cell's bottom border vanishes too). */
  border-right-color:var(--accent);
  border-bottom-color:var(--accent);
}
.icon-pick svg{width:22px;height:22px;pointer-events:none}

/* ===== presets — chip strip, mirrors portal's "名字预设" pattern ===== */
.presets-wrap{display:flex;flex-direction:column;gap:5px}
.presets-wrap .lbl-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:10.5px;color:var(--text-dim);letter-spacing:.5px;
  font-weight:700;text-transform:uppercase;
}
.presets-wrap .add{
  font-size:10.5px;color:var(--accent);cursor:pointer;
  background:transparent;border:1px solid transparent;
  padding:2px 8px;border-radius:0;
  font-family:inherit;font-weight:700;
  transition:background .12s, color .12s, border-color .12s;
}
.presets-wrap .add:hover{
  background:rgba(93,173,226,0.15);color:#7ec8f0;
  border-color:rgba(93,173,226,0.45);
}
.chips{display:flex;flex-wrap:wrap;gap:4px;min-height:24px}
.chips .empty{font-size:10.5px;color:var(--text-mute);padding:3px 0}
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 6px 4px 10px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:0;
  font-size:11px;color:#cdd1de;
  cursor:pointer;user-select:none;
  transition:background .12s, border-color .12s, color .12s;
}
.chip:hover{
  background:rgba(93,173,226,0.15);
  border-color:rgba(93,173,226,0.45);
  color:var(--text);
}
.chip .ico{
  width:13px;height:13px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--text-dim);
}
.chip .ico svg{width:13px;height:13px}
.chip:hover .ico{color:var(--accent-dim)}
.chip .del{
  font-size:11px;color:var(--text-mute);line-height:1;
  margin-left:2px;
  background:transparent;border:1px solid transparent;cursor:pointer;
  padding:1px 5px;border-radius:0;
  font-family:inherit;
  transition:color .12s, background .12s, border-color .12s;
}
.chip .del:hover{color:#fff;background:var(--accent-red);border-color:var(--accent-red)}

/* ===== preview row ===== */
.preview-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  background:var(--bg-strong);
  border:1px solid var(--border);
  border-radius:0;
}
.preview-icon{
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent-dim);
}
.preview-icon svg{width:26px;height:26px}
.preview-label{flex:1;font-size:11px;color:var(--text-dim)}

/* ===== bottom action row ===== */
.btn-row{
  display:flex;gap:6px;
  padding:12px 16px;
  background:var(--bg-strong);
  border-top:1px solid var(--border);
  flex-shrink:0;
  align-items:center;
}
.btn{
  height:30px;padding:0 14px;border-radius:0;
  background:var(--bg-card);color:var(--text);
  border:1px solid var(--border);font-size:12px;cursor:pointer;
  font-family:inherit;font-weight:600;letter-spacing:0.3px;
  transition:background .12s, border-color .12s, color .12s;
}
.btn:hover{background:rgba(93,173,226,0.18);border-color:rgba(93,173,226,0.45);color:#7ec8f0}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0b1320;font-weight:700}
.btn.primary:hover{background:#7ec8f0;border-color:#7ec8f0;color:#0b1320}
.btn.danger:hover{background:rgba(231,76,60,.20);border-color:rgba(231,76,60,.55);color:#ff7a6b}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <span class="ttl" id="title">编辑资源</span>
    <button class="x" id="btnX" type="button" title="关闭">×</button>
  </div>
  <div class="body">
    <label class="field">
      <span>名字</span>
      <input type="text" id="name" maxlength="32" placeholder="如：一环法术槽 / 灵感" />
    </label>

    <div class="field">
      <span>类型</span>
      <div class="type-toggle" id="typeToggle">
        <button type="button" data-type="count"  class="on">个数</button>
        <button type="button" data-type="bar">进度</button>
        <button type="button" data-type="number">数字</button>
      </div>
    </div>

    <div class="row-2">
      <label class="field">
        <span>当前</span>
        <input type="number" id="current" step="1" />
      </label>
      <label class="field">
        <span>最大</span>
        <input type="number" id="max" step="1" min="0" />
      </label>
    </div>

    <div class="field">
      <span>图标</span>
      <div class="icon-grid" id="iconGrid"></div>
    </div>

    <div class="presets-wrap">
      <div class="lbl-row">
        <span>预设（名字 · 类型 · 上限 · 图标 一起存）</span>
        <button class="add" id="btnAddPreset" type="button">+ 保存当前为预设</button>
      </div>
      <div class="chips" id="chipsPresets"></div>
    </div>

    <div class="preview-row" id="preview">
      <span class="preview-icon" id="previewIcon"></span>
      <span class="preview-label" id="previewLabel">预览</span>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn danger" id="btnDelete" type="button" style="display:none">删除</button>
    <span style="flex:1"></span>
    <button class="btn" id="btnCancel" type="button">取消</button>
    <button class="btn primary" id="btnSave" type="button">保存</button>
  </div>
</div>
<script type="module" src="/src/modules/resourceTracker/edit-page.ts"></script>
</body>
</html>
