<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>元数据检查</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:rgba(31,34,48,0.97);
  --bg2:rgba(15,17,28,0.85);
  --border:rgba(255,255,255,0.14);
  --border-strong:rgba(93,173,226,0.45);
  --text:#e6e8ee;
  --text-dim:#9aa0b3;
  --text-mute:#666b78;
  --accent:#5dade2;
  --accent-dim:#7ec8f0;
  --warn:#c89251;
  --green:#6fdc94;
  --pink:#e088b6;
}
html,body{
  height:100%;width:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Roboto,sans-serif;
  font-size:12.5px;background:transparent;color:var(--text);
  overflow:hidden;
}
body{padding:0;pointer-events:none;position:relative}

/* Hard-pin the bubble to fill the iframe viewport via inset:0 instead
   of nested flexbox + height:100% chains. Removes any ambiguity about
   what 100% resolves to and guarantees the inner .body element gets
   a usable scroll region. */
.bubble{
  position:absolute;inset:0;
  background:var(--bg);
  border:1px solid var(--border-strong);
  border-radius:10px;
  box-shadow:0 12px 36px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
  pointer-events:auto;
  display:grid;
  /* head | tabs | sub | body */
  grid-template-rows:auto auto auto 1fr;
  overflow:hidden;
}
.head{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px 7px;
  background:linear-gradient(180deg, rgba(93,173,226,0.10), transparent);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.head .ic{
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--accent-dim);
  background:rgba(93,173,226,0.18);
  border:1px solid rgba(93,173,226,0.4);
  border-radius:50%;
  flex-shrink:0;
  letter-spacing:0;
}
.head .ttl{
  flex:1;font-size:12px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.2px;
}
.head .x{
  background:none;border:none;color:var(--text-dim);
  cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;
  border-radius:4px;font-family:inherit;
}
.head .x:hover{color:var(--text);background:rgba(255,255,255,0.08)}

.sub{
  font-size:10.5px;color:var(--text-dim);
  padding:5px 12px 7px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  font-family:ui-monospace,Consolas,monospace;
}
.sub b{color:var(--text);font-weight:700}

/* Mode tabs — 物体 / 场景 / 房间. Sit between head and sub so the
   sub-line still describes whatever is currently being shown. */
.tabs{
  display:flex;
  background:rgba(0,0,0,0.20);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tabs button{
  flex:1;
  background:none;border:none;
  color:var(--text-dim);
  font-family:inherit;font-size:11px;font-weight:700;
  letter-spacing:0.4px;
  padding:7px 4px 6px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .12s, background .12s, border-color .12s;
}
.tabs button:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.tabs button.on{
  color:var(--accent-dim);
  border-bottom-color:var(--accent);
  background:rgba(93,173,226,0.08);
}

.body{
  flex:1;min-height:0;
  overflow-y:auto;
  padding:6px 8px 10px;
  display:flex;flex-direction:column;gap:6px;
}
.body::-webkit-scrollbar{width:6px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.14);border-radius:3px}

.group{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:6px;
  /* No overflow:hidden here — content scroll is handled by .body. */
}
/* Two-row header: top row = badge + label, bottom row = count +
   namespace meta. Stacking lets long labels like "枭熊套件 · 人物卡"
   render in full without competing with the namespace string for
   horizontal space. */
.group-head{
  display:flex;flex-direction:column;gap:2px;
  padding:5px 8px 6px;
  background:rgba(255,255,255,0.04);
  border-bottom:1px solid var(--border);
  color:var(--text);
}
.group-head-top{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;
  letter-spacing:0.3px;
}
.group-head-top .badge{
  flex-shrink:0;
  font-size:9.5px;font-weight:600;
  padding:1px 6px;border-radius:8px;
  background:rgba(93,173,226,0.20);color:var(--accent-dim);
  border:1px solid rgba(93,173,226,0.40);
  letter-spacing:0.3px;
}
.group-head-top .badge.suite{background:rgba(245,166,35,0.16);color:var(--warn);border-color:rgba(245,166,35,0.40)}
.group-head-top .badge.external{background:rgba(155,89,182,0.18);color:var(--pink);border-color:rgba(155,89,182,0.45)}
.group-head-top .badge.builtin{background:rgba(46,204,113,0.16);color:var(--green);border-color:rgba(46,204,113,0.40)}
.group-head-top .label{
  flex:1;min-width:0;
  white-space:normal;word-break:break-word;
}
.group-head-bottom{
  font-size:10px;color:var(--text-dim);font-weight:500;
  letter-spacing:0;
  word-break:break-all;
}
.group-head-bottom code{
  font-family:ui-monospace,Consolas,monospace;
  font-size:9.5px;
  color:var(--text-dim);
  background:rgba(0,0,0,0.20);
  padding:0 4px;border-radius:3px;
}

.kv-list{display:flex;flex-direction:column;gap:1px;padding:4px 0}
.kv{
  display:flex;flex-direction:column;gap:1px;
  padding:3px 8px;
  border-bottom:1px dashed rgba(255,255,255,0.04);
  font-family:ui-monospace,Consolas,monospace;
  font-size:11px;
}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--accent-dim);word-break:break-all}
.kv .v{
  color:var(--text);
  word-break:break-all;
  white-space:pre-wrap;
}
.kv .v.long{
  max-height:140px;overflow-y:auto;
  padding:3px 5px;
  background:rgba(0,0,0,0.25);
  border-radius:3px;border:1px solid var(--border);
  margin-top:2px;
}

.empty{
  text-align:center;padding:18px 12px;
  color:var(--text-mute);font-size:11.5px;
  font-style:italic;
}
.tag{
  display:inline-block;
  padding:1px 6px;margin-right:4px;
  font-size:10px;font-weight:600;
  border-radius:9px;
  background:rgba(255,255,255,0.06);
  color:var(--text-dim);
  font-family:inherit;
  letter-spacing:0.3px;
}
.tag.layer{background:rgba(93,173,226,0.16);color:var(--accent-dim)}
.tag.locked{background:rgba(245,166,35,0.16);color:var(--warn)}
.tag.invisible{background:rgba(231,76,60,0.16);color:#e88876}
</style>
</head>
<body>
<div class="bubble">
  <div class="head">
    <div class="ic">⌖</div>
    <div class="ttl" id="ttl">元数据检查</div>
    <button class="x" id="x" title="关闭">×</button>
  </div>
  <!-- Tabs only render in scene/room mode (set via JS). The item-mode
       small popover hides them entirely — the popover is exclusively
       for the selected item, no tab nav needed. -->
  <div class="tabs" id="tabs" style="display:none">
    <button id="tab-scene" class="on" type="button" title="OBR.scene.getMetadata() — 当前场景的元数据">场景</button>
    <button id="tab-room" type="button" title="OBR.room.getMetadata() — 房间级元数据（跨 scene）">房间</button>
  </div>
  <div class="sub" id="sub">…</div>
  <div class="body" id="body">
    <div class="empty">加载中…</div>
  </div>
</div>
<script type="module" src="/src/modules/metadata-inspector/inspector-page.ts"></script>
</body>
</html>
