<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>传送门</title>
<style>
/* Suite palette — mirrors cluster.html / settings.html */
:root{
  --bg-soft: rgba(31,34,48,0.92);
  --border: rgba(255,255,255,0.18);
  --border-strong: rgba(93,173,226,0.40);
  --text: #e6e8ee;
  --text-dim: #9aa0b3;
  --accent: #5dade2;
  --accent-dim: #7ec8f0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  background:transparent;color:var(--text);overflow:hidden;
}
/* The popover iframe is opened with hidePaper:true and the bg is
   transparent — we draw our own bubble with a faint stroke + tail
   so it visually anchors to the portal beneath. */
.bubble{
  position:absolute; left:8px; right:8px; top:8px; bottom:14px;
  background:var(--bg-soft);
  border:1px solid var(--border-strong);
  border-radius:10px;
  box-shadow:0 6px 22px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 18px rgba(93,173,226,0.10);
  backdrop-filter:blur(8px) saturate(1.05);
  -webkit-backdrop-filter:blur(8px) saturate(1.05);
  display:flex; flex-direction:column;
  padding:9px 10px 8px;
  overflow:hidden;
}
/* Downward-pointing tail (default — popover sits ABOVE the portal). */
.tail{
  position:absolute; left:50%; bottom:0;
  transform:translateX(-50%);
  width:14px; height:14px;
  background:var(--bg-soft);
  border-right:1px solid var(--border-strong);
  border-bottom:1px solid var(--border-strong);
  transform-origin:center;
  rotate:45deg; translate: -50% 50%;
}
/* Upward tail when the popover had to flip below the portal. */
body.below .bubble{ top:14px; bottom:8px; }
body.below .tail{
  top:0; bottom:auto;
  border-right:none; border-bottom:none;
  border-left:1px solid var(--border-strong);
  border-top:1px solid var(--border-strong);
  rotate:45deg; translate: -50% -50%;
}
.head{
  display:flex; align-items:center; gap:6px;
  font-size:11.5px; font-weight:700; color:var(--accent-dim);
  margin-bottom:6px;
}
.head .ico{font-size:13px;color:var(--accent)}
.head .nm{flex:1; color:var(--text); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.head .x{
  margin-left:4px; padding:0 5px; height:16px; line-height:14px;
  color:var(--text-dim); cursor:pointer; border-radius:3px;
  font-size:13px; font-weight:600;
}
.head .x:hover{background:rgba(255,255,255,.08); color:var(--text)}
.sub{
  font-size:10.5px; color:var(--text-dim); line-height:1.4;
  margin-bottom:5px;
  padding-bottom:4px;
  border-bottom:1px dashed rgba(255,255,255,.08);
}
.list{
  flex:1; overflow-y:auto;
  display:flex; flex-direction:column; gap:3px;
  padding-right:2px;
}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
.opt{
  display:flex; align-items:center; gap:7px;
  padding:6px 8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:6px;
  cursor:pointer;
  transition:background .12s, border-color .12s, transform .08s;
}
.opt:hover{background:rgba(93,173,226,.18);border-color:rgba(93,173,226,.55)}
.opt:active{transform:scale(0.98)}
.opt .ic{font-size:12px;color:var(--accent);flex-shrink:0}
.opt .nm{flex:1;font-size:12px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opt .hd{font-size:9px;color:var(--text-dim);font-style:italic}
.empty{padding:12px;text-align:center;color:var(--text-dim);font-size:11px}
</style>
</head>
<body>
<div class="bubble">
  <div class="head">
    <span class="ico">◐</span>
    <span class="nm" id="entry-name"></span>
    <span class="x" id="btn-close" title="关闭">×</span>
  </div>
  <div class="sub" id="sub"></div>
  <div class="list" id="list"></div>
</div>
<div class="tail"></div>
<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3.1.0";

const PLUGIN_ID = "com.obr-suite/portals";
const POPOVER_ID = `${PLUGIN_ID}/destination-popover`;
const BROADCAST_TELEPORT = `${PLUGIN_ID}/teleport`;
const BROADCAST_DEST_CLOSED = `${PLUGIN_ID}/dest-modal-closed`;

const LANG = (() => {
  try { const v = localStorage.getItem("obr-suite/lang"); if (v === "en" || v === "zh") return v; } catch {}
  return "zh";
})();
const L = {
  zh: {
    sub: (n) => `选择目的地 · ${n} 个单位`,
    empty: "没有同标签的其它传送门",
    hidden: "隐藏",
  },
  en: {
    sub: (n) => `Pick destination · ${n} unit${n === 1 ? "" : "s"}`,
    empty: "No other portals with this tag",
    hidden: "Hidden",
  },
}[LANG];
document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";

const params = new URLSearchParams(location.search);
let payload = { entryName: "", entryTag: "", candidates: [], tokenIds: [], placeBelow: false };
try { payload = JSON.parse(params.get("p") || "{}"); } catch {}

if (payload.placeBelow) document.body.classList.add("below");

const escHtml = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

document.getElementById("entry-name").textContent = payload.entryName || "传送门";
document.getElementById("sub").textContent = L.sub(payload.tokenIds.length);

const listEl = document.getElementById("list");
if (!payload.candidates || payload.candidates.length === 0) {
  listEl.innerHTML = `<div class="empty">${L.empty}</div>`;
} else {
  listEl.innerHTML = payload.candidates.map((c) =>
    `<div class="opt" data-id="${escHtml(c.id)}">
       <span class="ic">◐</span>
       <span class="nm">${escHtml(c.name)}</span>
       ${c.hidden ? `<span class="hd">${L.hidden}</span>` : ''}
     </div>`
  ).join("");
}

let closedFired = false;
async function notifyClosed() {
  if (closedFired) return;
  closedFired = true;
  try {
    await OBR.broadcast.sendMessage(BROADCAST_DEST_CLOSED, {}, { destination: "LOCAL" });
  } catch {}
}

async function dismiss() {
  await notifyClosed();
  try { await OBR.popover.close(POPOVER_ID); } catch {}
}

OBR.onReady(async () => {
  document.querySelectorAll(".opt").forEach((el) => {
    el.addEventListener("click", async () => {
      const destPortalId = el.dataset.id;
      try {
        await OBR.broadcast.sendMessage(
          BROADCAST_TELEPORT,
          { destPortalId, tokenIds: payload.tokenIds },
          { destination: "LOCAL" }
        );
      } catch (e) { console.error("[portals] teleport broadcast", e); }
      // Bg listener will close this popover and open the blink modal,
      // but send a close-signal as a belt-and-suspenders.
      await notifyClosed();
    });
  });
  document.getElementById("btn-close").addEventListener("click", dismiss);

  window.addEventListener("keydown", (ev) => {
    if (ev.key === "Escape") { ev.preventDefault(); void dismiss(); }
  });
  window.addEventListener("beforeunload", () => { void notifyClosed(); });
  window.addEventListener("pagehide", () => { void notifyClosed(); });
});
</script>
</body>
</html>
