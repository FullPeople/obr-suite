<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>血条</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;transition:none!important;animation:none!important}

html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:#eee;background:transparent;
  user-select:none;
}

.card{
  position:absolute;inset:0;
  background:rgba(22,33,62,0.94);
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.50);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:6px 10px;
  display:flex;flex-direction:column;gap:2px;
}
.card .row{display:flex;align-items:center;gap:6px}

/* 2026-05-10c — name row above the stat banner. Resolves to
   CC name → bestiary monster name → OBR item name (in that order
   of priority). Center-aligned; truncates with ellipsis when the
   name is too long for the popover width. */
.name-row{
  height:14px;
  font-size:11.5px;font-weight:700;
  color:rgba(255,255,255,0.92);
  text-align:center;
  letter-spacing:0.3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  padding:0 4px;
  text-shadow:0 1px 2px rgba(0,0,0,0.5);
}

/* Drag grip — same affordance as bestiary info / cc-info popovers. */
.drag-handle{
  flex-shrink:0;
  width:14px;height:30px;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  touch-action:none;user-select:none;
}
.drag-handle:hover{opacity:1;color:rgba(255,255,255,0.85)}
.drag-handle.is-dragging{cursor:grabbing;opacity:1;color:#5dade2}
.drag-handle svg{width:12px;height:18px;display:block;pointer-events:none}

/* 2026-05-11 — Reset button. Wipes the bubbles plugin's per-token
   cache via a LOCAL broadcast, forcing a full re-render. Used when
   the on-canvas HP bar / AC shield drift out of position. Sits at
   the very LEFT of the row (before drag handle + pin) so it's the
   first thing the user reaches when they need it. */
.reset-btn{
  flex-shrink:0;
  width:24px;height:24px;
  display:inline-flex;align-items:center;justify-content:center;
  background:transparent;
  border:1px solid rgba(255,255,255,0.20);
  border-radius:5px;
  color:rgba(255,255,255,0.60);
  cursor:pointer;
  padding:0;
  transition:color .12s, border-color .12s, background .12s, transform .15s;
}
.reset-btn:hover{
  color:rgba(255,255,255,0.95);
  border-color:rgba(245,166,35,0.55);
  background:rgba(245,166,35,0.10);
}
.reset-btn:active{transform:rotate(180deg)}
.reset-btn.flash{
  color:var(--gold,#f5a623);
  border-color:var(--gold,#f5a623);
  background:rgba(245,166,35,0.18);
  transform:rotate(180deg);
}
.reset-btn svg{width:13px;height:13px;display:block;pointer-events:none}

/* HP / Temp / AC banner — copied from bestiary-monster-info.html so
   the standalone bar visually matches the editor in the bestiary
   popover. Same CSS variable --hp-ratio drives the fill width. */
.stat-banner{
  flex:1;
  display:flex;align-items:center;gap:6px;
}
.hp-pill{
  flex:1;
  /* 2026-05-10c — guarantee the pill fits "999/999" (≈7 chars at
     15px tabular-nums = ~63px text + slash + 2×12px padding = 95px
     safe). Bumping the floor prevents truncation in the worst case
     and lets the temp/AC pills steal extra space when HP is small. */
  min-width:96px;
  position:relative;
  isolation:isolate;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:2px;
  min-height:32px;
  padding:0 10px;
  background:linear-gradient(135deg,#3a1a18,#4a221d);
  border:1px solid rgba(231,76,60,0.7);
  border-radius:16px;
  color:#fff;
  font-weight:800;font-size:14px;
  box-shadow:0 2px 6px rgba(231,76,60,0.32),0 0 0 1px rgba(0,0,0,0.18) inset;
  letter-spacing:0.3px;
}
.hp-pill::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,#c0392b,#e94560);
  width:calc(var(--hp-ratio, 1) * 100%);
  transition:width 0.18s ease-out;
  z-index:0;
  pointer-events:none;
}
.hp-pill > *{position:relative;z-index:1}
.hp-pill .slash{font-size:13px;font-weight:400;opacity:0.55;margin:0 1px}

.temp-pill{
  flex-shrink:0;
  width:32px;height:32px;
  border-radius:50%;
  background:linear-gradient(135deg,#f5a3c7,#ee7eaa);
  border:1px solid rgba(232,138,174,0.75);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:12px;
  box-shadow:0 2px 6px rgba(232,138,174,0.30),0 0 0 1px rgba(0,0,0,0.18) inset;
}
.ac-pill{
  flex-shrink:0;
  width:34px;height:38px;
  background:linear-gradient(135deg,#7ec8f0,#3498db);
  border:1px solid rgba(52,152,219,0.7);
  clip-path:polygon(0% 8%,100% 8%,100% 60%,50% 100%,0% 60%);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:13px;
  padding-bottom:8px;
  filter:drop-shadow(0 2px 4px rgba(52,152,219,0.40));
}
/* Stat cells now fill the parent pill so clicking ANYWHERE inside
   the pill focuses the input — easier than threading the needle on
   2 ch of digits. The slash between the two HP cells is a thin
   visual divider with pointer-events:none so the two halves stay
   independently clickable. */
.stat-cell{position:relative;display:flex;align-items:center;justify-content:center;cursor:text}
.hp-pill .stat-cell{flex:1;align-self:stretch}
.stat-input{
  background:transparent;border:none;
  color:inherit;
  font-family:inherit;font-weight:inherit;font-size:inherit;
  text-align:center;
  outline:none;padding:0;
  font-variant-numeric:tabular-nums;
  width:100%;height:100%;
  cursor:text;
  caret-color:rgba(255,255,255,0.9);
}
.stat-input:focus{
  text-decoration:underline;
  text-decoration-color:rgba(255,255,255,0.65);
  text-decoration-thickness:1px;
  text-underline-offset:2px;
}
.hp-pill .slash{pointer-events:none}
.temp-pill,.ac-pill{cursor:text}

/* 2026-05-10 — pin button. Mirrors the cc-info / monster-info pin:
   when pressed, the popover stays open across deselect / different-
   token selection (data still refreshes when a valid different
   token is selected). Per-client localStorage key +
   `com.obr-suite/hp-bar-pin-changed` LOCAL broadcast. */
.panel-pin-btn{
  flex-shrink:0;
  width:24px;height:24px;
  display:inline-flex;align-items:center;justify-content:center;
  background:transparent;
  border:1px solid rgba(255,255,255,0.20);
  border-radius:5px;
  color:rgba(255,255,255,0.55);
  cursor:pointer;
  padding:0;
  transition:color .12s, border-color .12s, background .12s, transform .12s;
}
.panel-pin-btn:hover{
  color:rgba(255,255,255,0.95);
  border-color:rgba(93,173,226,0.55);
}
.panel-pin-btn.pinned{
  color:#5dade2;
  border-color:rgba(93,173,226,0.80);
  background:rgba(93,173,226,0.18);
  transform:rotate(35deg);
}
.panel-pin-btn svg{width:12px;height:12px;display:block;pointer-events:none}

/* DM-only lock button — same affordance as bestiary monster-info /
   cc-info popovers. Toggles `metadata.locked` on the bubbles meta
   key, which gates whether players see HP details / AC. Hidden
   from players entirely (set display:none for non-GM clients via
   the JS body class). */
.stat-lock{
  flex-shrink:0;
  width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(190,24,24,0.38);
  border:1px solid rgba(248,113,113,0.95);
  border-radius:7px;
  cursor:pointer;
  color:#fecaca;
  box-shadow:0 0 0 2px rgba(127,29,29,0.28),0 0 12px rgba(248,113,113,0.35);
  padding:0;
  transition:filter .12s, background .12s, border-color .12s, color .12s;
}
.stat-lock:hover{filter:brightness(1.18)}
.stat-lock[data-locked="false"]{
  background:transparent;
  border-color:transparent;
  color:rgba(255,255,255,0.48);
  box-shadow:none;
}
body.is-player .stat-lock{display:none}
.stat-lock svg{width:14px;height:14px}
</style>
</head>
<body>
<div class="card">
  <div class="name-row" id="nameRow" title="">—</div>
  <div class="row">
    <button class="reset-btn" id="resetBtn" type="button"
            title="重置画面血条 — 清掉缓存重画，修复偶发的位置漂移">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8 a5 5 0 1 0 1.5 -3.5"/>
        <path d="M3.2 3 V5.5 H5.5"/>
      </svg>
    </button>
    <div class="drag-handle" id="dragHandle" title="拖动重新定位">
      <svg viewBox="0 0 6 16" fill="currentColor"><circle cx="2" cy="2" r="1"/><circle cx="2" cy="8" r="1"/><circle cx="2" cy="14" r="1"/><circle cx="5" cy="2" r="1"/><circle cx="5" cy="8" r="1"/><circle cx="5" cy="14" r="1"/></svg>
    </div>
    <button class="panel-pin-btn" id="panelPinBtn" type="button"
            aria-pressed="false" title="置顶面板（取消选中也保持显示）">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.339-.016-.484-.041L7.176 13.04a.5.5 0 0 1-.708 0L3.633 10.207 1.4 12.439a.5.5 0 0 1-.707-.707L2.926 9.5.74 7.314a.5.5 0 0 1 0-.708l1.51-1.51c.41-.41.945-.625 1.482-.711.534-.085 1.139-.097 1.683-.024.546.073 1.169.114 1.643-.04.305-.099.62-.281.94-.602.193-.193.282-.467.348-.749.066-.281.117-.572.196-.793a1.51 1.51 0 0 1 .31-.508c.094-.092.215-.174.357-.232a.5.5 0 0 1 .19-.04Z" fill="currentColor"/>
      </svg>
    </button>
    <div class="stat-banner">
      <div class="hp-pill" id="hpPill" style="--hp-ratio: 1">
        <span class="stat-cell">
          <input class="stat-input" data-field="health" type="text" value="0"/>
        </span>
        <span class="slash">/</span>
        <span class="stat-cell">
          <input class="stat-input" data-field="max health" type="text" value="0"/>
        </span>
      </div>
      <div class="temp-pill" title="临时生命">
        <input class="stat-input" data-field="temporary health" type="text" value="0"/>
      </div>
      <div class="ac-pill" title="护甲等级">
        <input class="stat-input" data-field="armor class" type="text" value="0"/>
      </div>
      <button class="stat-lock" id="lockBtn" type="button" data-locked="true" title="锁定 = 战斗外向玩家隐藏血条详情；解锁 = 全员可见">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="7" width="10" height="7" rx="1.5"/>
          <path class="lock-shackle" d="M5 7 V5 a3 3 0 0 1 6 0 v2"/>
        </svg>
      </button>
    </div>
  </div>
</div>
<script type="module" src="/src/hp-bar-page.ts"></script>
</body>
</html>
