<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>面板布局</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Roboto,sans-serif;
  color:#e6e8ee;
  user-select:none;
}

/* Fullscreen blocker — captures pointer events so the user can't
   accidentally click through to the canvas while arranging panels. */
.blocker{
  position:fixed;inset:0;
  background:rgba(7,12,24,0.55);
  cursor:default;
}

/* Bottom toolbar — pinned to the bottom of the viewport so it
   never sits on top of the panels the user is arranging at the
   top/middle of the screen. */
.toolbar{
  position:absolute;bottom:18px;left:50%;
  transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  background:rgba(15,20,40,0.95);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:14px;
  box-shadow:0 6px 22px rgba(0,0,0,0.55);
  z-index:50;
}
.toolbar .title{
  font-size:13px;font-weight:700;
  color:#bfe2f5;
  letter-spacing:0.4px;
}
.toolbar .hint{
  font-size:11px;color:#8a8e9c;
}
.toolbar button{
  height:28px;padding:0 12px;
  border-radius:6px;
  font-family:inherit;font-size:11.5px;font-weight:600;
  cursor:pointer;
  color:#fff;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.06);
  transition:filter .12s, background .12s;
}
.toolbar button:hover{background:rgba(255,255,255,0.12)}
.toolbar button.btn-reset{
  background:rgba(192,57,43,0.85);
  border-color:rgba(231,76,60,0.7);
}
.toolbar button.btn-done{
  background:linear-gradient(135deg,#27ae60,#1e8449);
  border-color:rgba(46,204,113,0.7);
}

/* Per-panel proxy — a translucent rectangle drawn at the panel's
   current viewport-coord bbox. Drag with pointer to reposition.
   Each rect carries a label centred so the user knows what they're
   moving even when the underlying popover isn't open. */
.proxy{
  position:absolute;
  border:2px solid rgba(93,173,226,0.95);
  border-radius:10px;
  background:rgba(93,173,226,0.14);
  cursor:grab;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;
  font-size:12px;font-weight:700;color:#bfe2f5;
  letter-spacing:0.4px;
  text-shadow:0 1px 2px rgba(0,0,0,0.6);
  box-shadow:
    0 0 0 1px rgba(7,19,32,0.55),
    0 0 18px rgba(93,173,226,0.35),
    inset 0 0 14px rgba(93,173,226,0.10);
  transition:box-shadow .12s;
}
/* Closed-state proxies: dimmer + dashed border so the user knows
   "this is where this panel WOULD land if opened". */
.proxy.is-closed{
  border-style:dashed;
  background:rgba(93,173,226,0.06);
  opacity:0.78;
}
.proxy.is-dragging{
  cursor:grabbing;
  box-shadow:
    0 0 0 1px rgba(7,19,32,0.65),
    0 0 26px rgba(93,173,226,0.55),
    inset 0 0 14px rgba(93,173,226,0.18);
  border-color:rgba(245,166,35,0.95);
}
.proxy .pname{
  background:rgba(7,19,32,0.78);
  padding:2px 9px;border-radius:10px;
  font-size:10.5px;font-weight:700;
  border:1px solid rgba(93,173,226,0.4);
}
.proxy .psize{
  font-size:9px;color:#7aa;
  font-family:ui-monospace,Consolas,monospace;
  font-weight:500;
}

/* Bottom-right resize handle. Only rendered for panels whose modules
   honour size overrides (dice-history / bestiary panel / cc-info /
   monster info). The handle has its own pointerdown listener that
   takes the gesture instead of letting the proxy's own drag handler
   pick it up. */
.proxy .resize-handle{
  position:absolute;
  right:-2px;bottom:-2px;
  width:18px;height:18px;
  cursor:nwse-resize;
  background:linear-gradient(135deg,transparent 50%,rgba(245,166,35,0.95) 50%);
  border-bottom-right-radius:10px;
  border-right:2px solid rgba(245,166,35,0.95);
  border-bottom:2px solid rgba(245,166,35,0.95);
}
.proxy.is-resizing .resize-handle{
  background:linear-gradient(135deg,transparent 50%,#f5d76e 50%);
}
.proxy.is-resizing{cursor:nwse-resize}
</style>
</head>
<body>
<div class="blocker" id="blocker">
  <div class="toolbar">
    <span class="title">调整面板布局</span>
    <span class="hint" id="hint">拖动面板代理到任意位置</span>
    <button class="btn-reset" id="btn-reset" type="button">重置全部</button>
    <button class="btn-done" id="btn-done" type="button">保存</button>
  </div>
</div>
<script type="module" src="/src/layout-editor.ts"></script>
</body>
</html>
