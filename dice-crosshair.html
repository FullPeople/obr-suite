<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Dice Crosshair</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:transparent;pointer-events:none}
/* DM-only crosshair shown while the dice action panel is open. The
   crosshair marks the screen center — when the DM rolls without a
   selected token, the auto-target path (panel-page.ts
   getOwnedSelectedTokenIds) picks the character whose on-screen center
   is closest to THIS exact point, then animates the camera to it.
   Rendered in a fullscreen modal with disablePointerEvents:true so it
   never blocks canvas interaction. The fixed positioning + viewport
   units mean the mark stays glued to the screen center regardless of
   where the OBR camera is panned to. */
.crosshair{
  position:fixed;
  left:50vw;top:50vh;
  width:0;height:0;
  /* No transform — the SVG itself is positioned with translate(-50%,-50%)
     via overflow:visible centered lines. */
}
.crosshair svg{
  position:absolute;
  left:-12px;top:-12px;
  width:24px;height:24px;
  overflow:visible;
}
/* Subtle drop-shadow so the mark stays readable over both bright
   battlemap art and dark void scenes. */
.crosshair line{
  stroke:#5dade2;
  stroke-width:1.5;
  stroke-linecap:round;
  filter:drop-shadow(0 0 2px rgba(0,0,0,0.65));
  opacity:0.85;
}
.crosshair circle{
  fill:none;
  stroke:#5dade2;
  stroke-width:1.2;
  filter:drop-shadow(0 0 2px rgba(0,0,0,0.65));
  opacity:0.55;
}
/* Pulse on the outer ring so the mark is noticeable without being
   garish. 2.4s cycle is slow enough that DMs scanning the board
   don't find it distracting; 0.55→0.85 opacity range keeps it
   in the background unless the DM looks for it. */
@keyframes ch-pulse {
  0%   { opacity:0.55; transform:scale(1) }
  50%  { opacity:0.85; transform:scale(1.18) }
  100% { opacity:0.55; transform:scale(1) }
}
.crosshair circle{
  transform-origin:12px 12px;
  animation:ch-pulse 2.4s ease-in-out infinite;
}
</style>
</head>
<body>
<div class="crosshair" aria-hidden="true">
  <svg viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="6"/>
    <line x1="12" y1="0"  x2="12" y2="9" />
    <line x1="12" y1="15" x2="12" y2="24"/>
    <line x1="0"  y1="12" x2="9"  y2="12"/>
    <line x1="15" y1="12" x2="24" y2="12"/>
  </svg>
</div>
</body>
</html>
