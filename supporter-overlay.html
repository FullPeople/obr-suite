<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Supporter Overlay</title>
<style>
/* Buff-fx-suite supporter-overlay — fullscreen modal opened
 * alongside the settings popover. Stays invisible until the
 * settings iframe broadcasts visibility=true (user enters the
 * Support / Feedback tab). Names float around the centred 640×580
 * "hole" reserved for the settings popover.
 *
 * Pointer events are disabled by OBR's `disablePointerEvents: true`,
 * so the entire iframe is click-through — the canvas / settings
 * popover behind us still work normally. */
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:#f0e8d0;
}
#scene{
  position:absolute;inset:0;
  /* 600 ms fade controlled by `.visible` class toggle. */
  opacity:0;
  transition:opacity 600ms ease;
  /* Black washy backdrop ONLY visible when the overlay is active. */
  background:radial-gradient(
    ellipse at center,
    rgba(0,0,0,0.50) 0%,
    rgba(0,0,0,0.78) 70%,
    rgba(0,0,0,0.86) 100%
  );
}
#scene.visible{ opacity:1 }

/* Per-name DOM element. Position is set inline via JS based on the
 * popup "hole" + random placement. Tier determines colour and
 * weight; font-size comes from supporterFontSize(amount). */
.name{
  position:absolute;
  white-space:nowrap;
  pointer-events:none;
  opacity:0;
  /* Fade-in: 1.2 s ease; the JS sets `opacity:1` when ready. The
   * hold-then-fade-out is also driven from JS. */
  transition:opacity 1200ms ease, transform 8000ms linear;
  letter-spacing:0.3px;
  /* Subtle glow to lift names off the black bg. Stronger for higher
   * tiers; default to a moderate glow. */
  text-shadow:
    0 0 6px rgba(0,0,0,0.85),
    0 0 12px rgba(0,0,0,0.65),
    0 1px 2px rgba(0,0,0,0.95);
}
/* 2026-05-14 — tier classes now ONLY drive weight + glow STRENGTH.
 * The colour is set inline per-name from a diverse palette (see
 * supporter-overlay-page.ts supporterColor()), so the glow here is
 * kept neutral-dark — a coloured glow would clash with whatever hue
 * the name happens to be. Higher tiers get a wider, brighter dark
 * halo so donation amount still reads at a glance. */
.name.t1 { font-weight:500 }
.name.t2 { font-weight:600 }
.name.t3 { font-weight:700;
  text-shadow:0 0 7px rgba(0,0,0,0.85),0 0 13px rgba(0,0,0,0.7),0 1px 2px rgba(0,0,0,0.95);
}
.name.t4 { font-weight:800;
  text-shadow:0 0 9px rgba(0,0,0,0.9),0 0 17px rgba(0,0,0,0.75),0 1px 2px rgba(0,0,0,0.95);
}
.name.t5 { font-weight:900;
  text-shadow:0 0 11px rgba(0,0,0,0.92),0 0 20px rgba(0,0,0,0.8),0 1px 3px rgba(0,0,0,0.98);
}

/* A subtle vignette around the popup hole so the centre is darker
 * than the surroundings — focuses attention on the settings card. */
#hole-vignette{
  position:absolute;
  width:760px;height:700px;
  left:50%;top:50%;transform:translate(-50%,-50%);
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.55) 30%, transparent 70%);
  pointer-events:none;
  z-index:1;
}

/* Animated star-twinkle dots in the background — extra ambience. */
#stars{
  position:absolute;inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.18) 50%, transparent 51%),
    radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.15) 50%, transparent 51%),
    radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.18) 50%, transparent 51%),
    radial-gradient(2px 2px at 85% 20%, rgba(255,255,255,0.12) 50%, transparent 51%),
    radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.15) 50%, transparent 51%);
  background-size:600px 600px;
  animation:twinkle 8s ease-in-out infinite alternate;
  opacity:0.7;
}
@keyframes twinkle{
  0%   { opacity:0.45; transform:scale(1); }
  100% { opacity:0.85; transform:scale(1.02); }
}
</style>
</head>
<body>
<div id="scene">
  <div id="stars"></div>
  <div id="hole-vignette"></div>
  <!-- Names get appended here by supporter-overlay-page.ts -->
</div>
<script type="module" src="/src/supporter-overlay-page.ts"></script>
</body>
</html>
