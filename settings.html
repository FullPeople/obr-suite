<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>枭熊插件 — 设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#292d3c;--bg-strong:#1f2230;--bg-card:#323748;
  --border:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.20);
  --text:#e6e8ee;--text-dim:#9aa0b3;
  --accent:#5dade2;--accent-warm:#f5a623;--accent-red:#e74c3c;--accent-green:#2ecc71;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;overflow:hidden}
body{display:flex;flex-direction:column;border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 12px 36px rgba(0,0,0,0.5)}

.head{
  flex-shrink:0;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.head h1{font-size:15px;font-weight:700;letter-spacing:0.3px}
.head .role{font-size:10.5px;color:var(--text-dim)}

.body{flex:1;min-height:0;overflow-y:auto;padding:14px 18px}
.body::-webkit-scrollbar{width:6px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px}

.section{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px 14px;
  margin-bottom:12px;
}
.section-title{
  font-size:11.5px;font-weight:700;color:var(--text-dim);
  letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;
}
.section-sub{font-size:10.5px;color:var(--text-dim);margin-bottom:6px}

.row{
  display:flex;align-items:center;gap:10px;
  padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.row:last-child{border-bottom:none}
.row .lbl{flex:1;font-size:12.5px}
.row .lbl .desc{font-size:10.5px;color:var(--text-dim);margin-top:1px}

/* Toggle switch */
.tog{
  flex-shrink:0;width:38px;height:20px;
  background:rgba(0,0,0,0.4);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;padding:0;position:relative;
  transition:background .18s, border-color .18s;
}
.tog::before{
  content:"";position:absolute;top:1px;left:1px;
  width:16px;height:16px;background:#9aa0b3;border-radius:50%;
  transition:left .18s, background .18s;
}
.tog.on{background:rgba(46,204,113,0.3);border-color:rgba(46,204,113,0.6)}
.tog.on::before{left:19px;background:#2ecc71}
.tog:disabled{opacity:0.45;cursor:not-allowed}

/* Radio group */
.radio-group{display:flex;flex-direction:column;gap:4px}
.radio-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:5px;cursor:pointer;
  transition:background .12s;
}
.radio-row:hover{background:rgba(255,255,255,0.04)}
.radio-row input[type="radio"]{accent-color:var(--accent);cursor:pointer}
.radio-row.disabled{opacity:0.55;cursor:not-allowed}
.radio-row.disabled input{cursor:not-allowed}

.warn{
  background:rgba(245,166,35,0.12);
  border:1px solid rgba(245,166,35,0.30);
  border-radius:6px;padding:8px 10px;font-size:11px;color:#f5d76e;
  margin-top:8px;line-height:1.5;
}

.foot{
  flex-shrink:0;padding:10px 18px;
  display:flex;justify-content:flex-end;gap:8px;
  border-top:1px solid var(--border);
  background:var(--bg-strong);border-radius:0 0 10px 10px;
}
.btn{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--text);padding:6px 14px;border-radius:5px;
  font-family:inherit;font-size:12px;cursor:pointer;
}
.btn:hover{background:rgba(255,255,255,0.10);border-color:var(--border-strong)}
.btn.primary{background:rgba(93,173,226,0.20);border-color:rgba(93,173,226,0.5);color:#7ec8f0}
</style>
</head>
<body>
  <div class="head">
    <h1 id="title">设置</h1>
    <span class="role" id="role"></span>
  </div>
  <div class="body" id="body"></div>
  <div class="foot">
    <button class="btn primary" id="closeBtn">关闭</button>
  </div>
<script type="module" src="/src/settings.ts"></script>
</body>
</html>
