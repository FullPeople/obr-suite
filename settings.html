<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>枭熊插件 — 设置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#292d3c;--bg-strong:#1f2230;--bg-card:#323748;
  --border:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.20);
  --text:#e6e8ee;--text-dim:#9aa0b3;
  --accent:#5dade2;--accent-warm:#f5a623;--accent-red:#e74c3c;--accent-green:#2ecc71;
  --kofi:#ff5e5b;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:13px;overflow:hidden}
body{display:flex;flex-direction:column;border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 12px 36px rgba(0,0,0,0.5)}

.head{
  flex-shrink:0;padding:12px 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.head h1{font-size:15px;font-weight:700;letter-spacing:0.3px}
.lang-switch{
  display:flex;background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:5px;overflow:hidden;
}
.lang-switch button{
  background:transparent;border:none;color:var(--text-dim);
  padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:0.5px;
}
.lang-switch button.on{background:rgba(93,173,226,0.25);color:#7ec8f0}
.lang-switch button + button{border-left:1px solid var(--border)}

.main{flex:1;min-height:0;display:flex}
.tabs{
  width:160px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--bg-strong);
  overflow-y:auto;padding:8px 0;
}
.tabs::-webkit-scrollbar{width:5px}
.tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:2px}
.tab{
  display:block;width:100%;
  padding:9px 14px;
  background:transparent;border:none;
  color:var(--text-dim);font-family:inherit;font-size:12px;text-align:left;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .12s, color .12s, border-color .12s;
}
.tab:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.tab.on{background:rgba(93,173,226,0.10);color:#7ec8f0;border-left-color:var(--accent)}
.tab .tab-sub{display:block;font-size:9.5px;color:var(--text-dim);margin-top:2px;letter-spacing:0.5px}

.content-wrap{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
}

/* Per-tab top bar: title (left) + plugin enable toggle (right, only for
   plugin tabs that actually have a flag) */
.top-bar{
  flex-shrink:0;
  padding:12px 22px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  border-bottom:1px solid var(--border);
}
.top-bar h2{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.2px}
.top-bar .meta{font-size:10.5px;color:var(--text-dim)}

.content{
  flex:1;min-height:0;
  overflow-y:auto;padding:14px 22px;
  line-height:1.65;
}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:3px}

.content h3{font-size:12.5px;font-weight:700;color:var(--accent-warm);margin-top:14px;margin-bottom:6px;letter-spacing:0.3px}
.content h3:first-child{margin-top:0}
.content p{margin-bottom:8px;color:#cdd1de;font-size:12.5px}
.content ul{padding-left:18px;margin-bottom:10px}
.content li{margin-bottom:4px;color:#cdd1de;font-size:12.5px}
.content a{color:var(--accent);text-decoration:none}
.content a:hover{text-decoration:underline}

/* === Toggle switch === */
.tog{
  flex-shrink:0;width:42px;height:22px;
  background:rgba(0,0,0,0.4);border:1px solid var(--border);
  border-radius:11px;cursor:pointer;padding:0;position:relative;
  transition:background .18s, border-color .18s;
}
.tog::before{
  content:"";position:absolute;top:1px;left:1px;
  width:18px;height:18px;background:#9aa0b3;border-radius:50%;
  transition:left .18s, background .18s;
}
.tog.on{background:rgba(46,204,113,0.3);border-color:rgba(46,204,113,0.6)}
.tog.on::before{left:21px;background:#2ecc71}
.tog:disabled{opacity:0.45;cursor:not-allowed}

/* === 3-segment slider for data version === */
.seg{
  display:inline-flex;align-items:center;
  background:rgba(0,0,0,0.3);border:1px solid var(--border-strong);
  border-radius:8px;overflow:hidden;height:32px;
  margin:8px 0;
}
.seg button{
  background:transparent;border:none;
  color:var(--text-dim);font-family:inherit;font-size:11.5px;font-weight:700;
  padding:0 18px;height:100%;cursor:pointer;letter-spacing:0.3px;
  border-right:1px solid var(--border);
  transition:background .12s, color .12s;
}
.seg button:last-child{border-right:none}
.seg button:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.seg button.on{background:rgba(93,173,226,0.25);color:#7ec8f0}
.seg button:disabled{cursor:not-allowed;opacity:0.5}

.row{display:flex;align-items:center;gap:10px;padding:7px 0}
.row .lbl{flex:1}
.row .lbl .desc{font-size:10.5px;color:var(--text-dim);margin-top:1px}

.warn{
  background:rgba(245,166,35,0.12);
  border:1px solid rgba(245,166,35,0.30);
  border-radius:6px;padding:8px 10px;font-size:11px;color:#f5d76e;
  margin-top:10px;line-height:1.5;
}
.note{
  background:rgba(255,255,255,0.03);
  border-left:3px solid var(--accent-warm);
  padding:9px 12px;margin-top:10px;font-size:11.5px;color:#bbb;border-radius:0 4px 4px 0;line-height:1.6;
}

/* Support tab buttons — muted style; uses tinted background rather than
   their full brand colors so they read as part of the suite UI rather
   than competing for attention. */
.support-row{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 8px}
.support-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:7px 14px;border-radius:6px;
  font-family:inherit;font-size:12px;font-weight:500;
  text-decoration:none;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--text);
  transition:background .15s, border-color .15s;
}
.support-btn:hover{
  text-decoration:none;
  background:rgba(255,255,255,0.08);
  border-color:var(--border-strong);
}
.support-btn.kofi:hover{border-color:rgba(255,94,91,0.4)}
.support-btn.kofi .ic{color:var(--kofi)}
.support-btn.afdian:hover{border-color:rgba(255,107,157,0.4)}
.support-btn.afdian .ic{color:#ff6b9d}
.support-btn .ic{font-size:14px;line-height:1}
.contact-box{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-top:10px;font-size:12px}
.contact-box code{font-family:ui-monospace,Consolas,monospace;color:var(--accent)}

/* Important-notes tab: stepped instructions with screenshots */
.step{margin:12px 0 16px;padding:12px 14px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:3px solid var(--accent)}
.step-title{font-size:12.5px;font-weight:700;color:#7ec8f0;margin-bottom:6px}
.step p{margin-bottom:6px;font-size:12px;color:#cdd1de}
.step img{display:block;max-width:100%;height:auto;border-radius:4px;margin:6px 0;box-shadow:0 2px 6px rgba(0,0,0,0.4);background:var(--bg-card)}
.tip-line{font-size:11.5px;color:var(--text-dim);margin-top:6px}
.benefit-list{padding-left:18px;margin:8px 0 12px}
.benefit-list li{margin-bottom:4px;color:#cdd1de;font-size:12px}
.benefit-tag{display:inline-block;font-size:10px;background:rgba(52,152,219,0.15);color:#5dade2;padding:2px 6px;border-radius:4px;margin-right:6px}

.role-notice{font-size:10.5px;color:var(--text-dim);font-style:italic}
</style>
</head>
<body>
  <div class="head">
    <h1 id="title">设置</h1>
    <div class="lang-switch">
      <button id="langZh" class="on" type="button">CN</button>
      <button id="langEn" type="button">EN</button>
    </div>
  </div>
  <div class="main">
    <nav class="tabs" id="tabs"></nav>
    <article class="content-wrap">
      <div class="top-bar" id="topBar"></div>
      <div class="content" id="content"></div>
    </article>
  </div>
<script type="module" src="/src/settings.ts"></script>
</body>
</html>
