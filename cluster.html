<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Owl Suite Cluster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#eee}

:root{
  --bg: #292d3c;
  --bg-strong: #1f2230;
  --bg-soft: rgba(41,45,60,0.92);
  --border: rgba(255,255,255,0.14);
  --border-strong: rgba(255,255,255,0.22);
  --text: #e6e8ee;
  --text-dim: #9aa0b3;
  --accent: #5dade2;
}

.wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:flex-end;
  padding:0;
  pointer-events:none;
}
.cluster{
  pointer-events:auto;
  display:flex;align-items:center;gap:8px;
  padding:8px;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 6px 22px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset;
  backdrop-filter:blur(8px);
  height:56px;
}

.row{
  display:flex;align-items:center;gap:6px;
  height:40px;
  overflow:hidden;
}
.wrap:not(.expanded) .row{display:none}

/* ===== Popup-toggle group =====
   Solid frame, vertical 悬浮窗 label inside (one char per line).
   Inner buttons are neutral; OFF state strips the box and shows just the
   icon-style label with a strikethrough. */
.group{
  display:flex;align-items:stretch;
  height:40px;
  border:1px solid var(--border-strong);
  border-radius:8px;
  background:rgba(0,0,0,0.18);
  padding:3px 4px 3px 0;
  gap:3px;
}
.group .glabel{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:8.5px;color:var(--text-dim);
  padding:0 5px;letter-spacing:0;
  font-weight:700;
  line-height:1.05;
  background:rgba(255,255,255,0.04);
  border-radius:5px 0 0 5px;
  margin-right:2px;
  align-self:stretch;
}
.group .glabel span{display:block}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:32px;min-width:32px;padding:0 10px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--text);font-family:inherit;font-size:11.5px;font-weight:600;
  cursor:pointer;letter-spacing:0.2px;
  transition:background .12s, border-color .12s, color .12s;
  white-space:nowrap;
  gap:4px;
  position:relative;
}
.btn:hover{background:rgba(255,255,255,0.10);border-color:var(--border-strong)}
.btn:active{background:rgba(255,255,255,0.14)}

/* Toggle (popup) buttons inside the group — neutral when ON,
   "stripped + strikethrough" when OFF. */
.btn.toggle{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--text);
}
.btn.toggle.on{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--text);
}
.btn.toggle.off{
  background:transparent;
  border:1px solid transparent;
  color:var(--text-dim);
  text-decoration:line-through;
  text-decoration-color:var(--text-dim);
  text-decoration-thickness:1.5px;
}

/* Time stop active = warning yellow (this is a state indicator, not a
   toggle, so it keeps a color to make "currently on" obvious) */
.btn.timestop-active{background:rgba(245,166,35,0.18);border-color:rgba(245,166,35,0.5);color:#f5d76e}

/* Main floating button — rectangular, uses exe_icon.png */
.main{
  display:inline-flex;align-items:center;justify-content:center;
  width:40px;height:40px;
  background:linear-gradient(135deg,#3a3f55,#252a3a);
  border:1px solid var(--border-strong);
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
  padding:0;
  flex-shrink:0;
  transition:filter .12s;
  overflow:hidden;
}
.main:hover{filter:brightness(1.15)}
.main img{width:36px;height:36px;display:block;image-rendering:auto}

/* Gear icon for the merged settings/about button */
.btn .gear{width:16px;height:16px;display:inline-block;color:currentColor}

.btn .ic{font-size:13px;line-height:1}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="cluster" id="cluster">
    <div class="row" id="row"></div>
    <button class="main" id="main" type="button" title="枭熊插件">
      <img src="/suite/exe_icon.png" alt="">
    </button>
  </div>
</div>
<script type="module" src="/src/cluster.ts"></script>
</body>
</html>
