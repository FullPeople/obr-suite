<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Dice Menu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:rgba(31,34,48,0.97);
  --border:rgba(255,255,255,0.16);
  --text:#e6e8ee;--text-dim:#9aa0b3;
  --accent:#7aa2c4;--green:#7be0a0;--red:#ff8b7a;--yellow:#f5d76e;
  --purple:#bb87dd;
}
html,body{
  height:100%;width:100%;overflow:hidden;background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:var(--text);font-size:12px;
}
.menu{
  position:absolute;inset:0;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:4px;
  box-shadow:0 6px 22px rgba(0,0,0,0.55);
  user-select:none;
  -webkit-user-select:none;
}
.item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:5px;cursor:pointer;
  white-space:nowrap;
  transition:background .12s;
  font-family:inherit;color:inherit;font-size:12px;
  background:transparent;border:none;
  width:100%;text-align:left;
}
.item:hover{background:rgba(93,173,226,0.22)}
.item .ico{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;font-size:13px;font-weight:700;color:var(--accent);
  flex-shrink:0;
}
.item.adv .ico{color:var(--green)}
.item.dis .ico{color:var(--red)}
.item.tray .ico{color:var(--yellow)}
.item.dark .ico{color:var(--purple)}
.sep{height:1px;background:rgba(255,255,255,0.10);margin:3px 4px}
</style>
</head>
<body>
<div class="menu">
  <button class="item" data-act="roll"><span class="ico">⚀</span><span data-l="roll">投掷</span></button>
  <button class="item dark" data-act="dark"><span class="ico">●</span><span data-l="dark">暗骰</span></button>
  <button class="item adv" data-act="adv"><span class="ico">▲</span><span data-l="adv">优势</span></button>
  <button class="item dis" data-act="dis"><span class="ico">▼</span><span data-l="dis">劣势</span></button>
  <div class="sep"></div>
  <button class="item tray" data-act="tray"><span class="ico">＋</span><span data-l="tray">添加到骰盘</span></button>
</div>
<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3.1.0";

const POPOVER_ID = "com.obr-suite/rollable-menu";
const BC_QUICK_ROLL = "com.obr-suite/dice-quick-roll";
const BC_PANEL_TOGGLE = "com.obr-suite/dice-panel-toggle";
// Group-save mode (used by bestiary-group-saves popover). When the
// menu is opened with `?groupSave=1&ability=<key>`, clicks broadcast
// to BC_GROUP_SAVE_FIRE instead of BC_QUICK_ROLL — the bestiary group-
// saves bg module receives the broadcast and fires per-token rolls
// with each monster's own save bonus.
const BC_GROUP_SAVE_FIRE = "com.obr-suite/bestiary-group-save-fire";

// Per-client UI language (mirrors src/state.ts LS_LANG).
const LANG = (() => {
  try { const v = localStorage.getItem("obr-suite/lang"); if (v === "en" || v === "zh") return v; } catch {}
  return "zh";
})();
const L = {
  zh: { roll: "投掷", dark: "暗骰", adv: "优势", dis: "劣势", tray: "添加到骰盘" },
  en: { roll: "Roll", dark: "Dark Roll", adv: "Advantage", dis: "Disadvantage", tray: "Add to Tray" },
}[LANG];
document.querySelectorAll("[data-l]").forEach((el) => { el.textContent = L[el.dataset.l] ?? el.textContent; });
document.documentElement.lang = LANG === "zh" ? "zh-CN" : "en";

const params = new URLSearchParams(location.search);
const expression = params.get("expr") ?? "";
const label = params.get("label") ?? "";
const itemId = params.get("itemId") || null;

// "Group save" mode — drop the add-to-tray item (each token has its
// own per-bonus expression so a single tray entry can't represent the
// group). The remaining 4 items broadcast to BC_GROUP_SAVE_FIRE.
const groupSave = params.get("groupSave") === "1";
const groupAbility = params.get("ability") ?? "";
if (groupSave) {
  const tray = document.querySelector(".item.tray");
  const sep = document.querySelector(".sep");
  if (tray) tray.remove();
  if (sep) sep.remove();
}

async function close() {
  try { await OBR.popover.close(POPOVER_ID); } catch {}
}

OBR.onReady(() => {
  document.querySelectorAll(".item").forEach((el) => {
    el.addEventListener("click", async () => {
      const act = el.dataset.act ?? "";
      try {
        if (groupSave && groupAbility) {
          // Group-save dispatch — BG module owns the per-token bonus
          // resolution + collectiveId grouping. Tray is hidden in this
          // mode, so we never see act === "tray" here.
          if (act === "roll") {
            await OBR.broadcast.sendMessage(
              BC_GROUP_SAVE_FIRE,
              { ability: groupAbility, hidden: false },
              { destination: "LOCAL" },
            );
          } else if (act === "dark") {
            await OBR.broadcast.sendMessage(
              BC_GROUP_SAVE_FIRE,
              { ability: groupAbility, hidden: true },
              { destination: "LOCAL" },
            );
          } else if (act === "adv" || act === "dis") {
            await OBR.broadcast.sendMessage(
              BC_GROUP_SAVE_FIRE,
              { ability: groupAbility, advMode: act },
              { destination: "LOCAL" },
            );
          }
        } else if (act === "tray") {
          await OBR.broadcast.sendMessage(
            BC_PANEL_TOGGLE,
            { open: true, prefill: expression },
            { destination: "LOCAL" },
          );
        } else if (act === "roll") {
          await OBR.broadcast.sendMessage(
            BC_QUICK_ROLL,
            { expression, label, itemId, focus: !!itemId, hidden: false },
            { destination: "LOCAL" },
          );
        } else if (act === "dark") {
          await OBR.broadcast.sendMessage(
            BC_QUICK_ROLL,
            { expression, label, itemId, focus: !!itemId, hidden: true },
            { destination: "LOCAL" },
          );
        } else if (act === "adv" || act === "dis") {
          await OBR.broadcast.sendMessage(
            BC_QUICK_ROLL,
            { expression, label, itemId, focus: !!itemId, hidden: false, advMode: act },
            { destination: "LOCAL" },
          );
        }
      } catch (e) { console.error("[rollable-menu]", e); }
      await close();
    });
  });

  // Auto-close if user presses Esc.
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      e.preventDefault();
      void close();
    }
  });
});
</script>
</body>
</html>
