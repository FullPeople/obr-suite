<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Owl Suite Cluster Row</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#eee}

:root{
  --border: rgba(255,255,255,0.14);
  --border-strong: rgba(255,255,255,0.22);
  --text: #e6e8ee;
  --text-dim: #9aa0b3;
  --accent: #5dade2;
}

/* Row popover floats above the trigger. Background of the popover frame
   is fully transparent — each button has its own backdrop so the
   visual reads as a row of floating chips, not a single bar. */
.wrap{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:flex-start;
  pointer-events:none;
  padding:0 8px;
}
/* Row itself is click-through — only the actual buttons / button
   groups inside grab pointer events. Without this the right-side
   tail of the .row's flex-direction:row-reverse layout blocked
   clicks for ~110px past the gear button (the row was a single
   pointer-events:auto block whose visual width didn't match its
   click-blocking width when the wrap flipped sides). */
.row{
  pointer-events:none;
  display:flex;align-items:center;gap:6px;
  flex-wrap:nowrap;
  /* Width tracks content exactly so the gap between row and the
     drag handle stays constant even when flex-direction flips. */
  width:max-content;
  flex-shrink:0;
}
.row > *{pointer-events:auto}

/* ===== Popup-toggle group =====
   Solid frame, vertical 悬浮窗 label inside (one char per line). */
.group{
  display:flex;align-items:stretch;
  height:40px;
  border:1px solid var(--border-strong);
  border-radius:8px;
  background:rgba(0,0,0,0.32);
  padding:3px 4px 3px 0;
  gap:3px;
  backdrop-filter:blur(8px);
}
.group .glabel{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:8.5px;color:var(--text-dim);
  padding:0 5px;letter-spacing:0;
  font-weight:700;line-height:1.05;
  background:rgba(255,255,255,0.04);
  border-radius:5px 0 0 5px;
  margin-right:2px;
  align-self:stretch;
}
.group .glabel span{display:block}
.group.h-label .glabel{
  flex-direction:row;
  padding:0 8px;
  font-size:9.5px;
  letter-spacing:0.2px;
  white-space:nowrap;
}
.group.h-label .glabel span{display:inline}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  height:40px;min-width:40px;padding:0 12px;
  background:rgba(41,45,60,0.92);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;letter-spacing:0.2px;
  transition:background .12s, border-color .12s, color .12s, transform .08s;
  white-space:nowrap;
  gap:4px;
  position:relative;
  backdrop-filter:blur(8px);
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
}
.btn:hover{background:rgba(60,65,85,0.95);border-color:var(--border-strong)}
.btn:active{background:rgba(75,80,100,0.98);transform:scale(0.97)}

/* Toggles inside .group keep flatter look (group provides the frame). */
.group .btn{
  height:32px;min-width:32px;padding:0 10px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  font-size:11.5px;
  box-shadow:none;
  backdrop-filter:none;
}
.group .btn.toggle.on{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--text);
}
.group .btn.toggle.off{
  background:transparent;
  border:1px solid transparent;
  color:var(--text-dim);
  text-decoration:line-through;
  text-decoration-color:var(--text-dim);
  text-decoration-thickness:1.5px;
}

/* Time stop active state */
.btn.timestop-active{background:rgba(245,166,35,0.22);border-color:rgba(245,166,35,0.55);color:#f5d76e}

.btn .gear{width:18px;height:18px;display:inline-block;color:currentColor}

.btn#btnAnnounce svg{width:18px;height:18px;display:block;color:currentColor}
.btn#btnAnnounce.blink{
  color:#f5d76e;
  border-color:rgba(245,166,35,0.65);
  background:rgba(245,166,35,0.18);
  animation:announce-blink 1.2s ease-in-out infinite;
}
@keyframes announce-blink{
  0%, 100%{
    box-shadow:0 0 0 0 rgba(245,166,35,0), 0 2px 8px rgba(0,0,0,0.35);
    background:rgba(245,166,35,0.18);
  }
  50%{
    box-shadow:0 0 12px 2px rgba(245,166,35,0.55), 0 2px 8px rgba(0,0,0,0.35);
    background:rgba(245,166,35,0.30);
  }
}

/* Sibling layout: the drag handle is a sibling of .row inside .wrap.
   .wrap is already display:flex; the handle is a `pointer-events:auto`
   chip that sits to the LEFT or RIGHT of the row depending on the
   side hint set on the wrap's data-handle-side attribute.
   Click-blocking footprint of this iframe can be visualised by
   toggling 设置 → 基础设置 → 调试模式 (the body picks up the
   `debug-overlay-on` class and tints itself). */
.wrap{
  display:flex;align-items:center;
  pointer-events:none;
}
.wrap[data-handle-side="left"]{flex-direction:row}
.wrap[data-handle-side="right"]{flex-direction:row-reverse;justify-content:flex-end}
.row-drag-handle{
  pointer-events:auto;
  display:inline-flex;
  align-items:center;justify-content:center;
  width:14px;height:32px;
  margin:0 4px;
  background:rgba(31,34,48,0.65);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:5px;
  color:rgba(255,255,255,0.55);
  cursor:grab;
  touch-action:none;user-select:none;
  flex-shrink:0;
  transition:color .12s, background .12s;
}
.row-drag-handle:hover{color:#fff;background:rgba(50,55,75,0.92)}
.row-drag-handle.is-dragging{cursor:grabbing;color:#5dade2}
.row-drag-handle svg{width:8px;height:14px;display:block;pointer-events:none}
</style>
</head>
<body>
<div class="wrap" id="wrap" data-handle-side="right">
  <span class="row-drag-handle" id="row-drag-handle" data-side="right" title="拖动 / Drag" aria-label="拖动快捷键栏">
    <svg viewBox="0 0 8 14" aria-hidden="true">
      <circle cx="2" cy="2" r="1" fill="currentColor"/><circle cx="6" cy="2" r="1" fill="currentColor"/>
      <circle cx="2" cy="7" r="1" fill="currentColor"/><circle cx="6" cy="7" r="1" fill="currentColor"/>
      <circle cx="2" cy="12" r="1" fill="currentColor"/><circle cx="6" cy="12" r="1" fill="currentColor"/>
    </svg>
  </span>
  <div class="row" id="row"></div>
</div>
<script type="module" src="/src/cluster-row.ts"></script>
</body>
</html>
