<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent}
/* Cinematic letterbox bars — the default time-stop look. */
.cinema{position:fixed;left:0;right:0;height:18vh;background:rgba(0,0,0,0.75);pointer-events:none;opacity:0;transition:opacity 1.2s ease}
.cinema.show{opacity:1}
.top{top:0}
.bottom{bottom:0}
/* 2026-05-14 (#7) — "显示为 CG" mode. A fullscreen black field with
   the chosen image centred + aspect-correct (object-fit:contain →
   letterboxed black where the image doesn't reach). When `.dm` is
   set the whole field drops to 0.1 opacity so the DM can keep
   working behind it (the modal is also opened pass-through for the
   DM). Mutually exclusive with the cinematic bars — CG mode never
   shows them. */
.cg-wrap{position:fixed;inset:0;background:#000;display:none;align-items:center;justify-content:center}
.cg-wrap.on{display:flex}
.cg-wrap.dm{opacity:0.1}
.cg-img{max-width:100%;max-height:100%;object-fit:contain;display:block}
</style>
</head>
<body>
<div class="cinema top" id="top"></div>
<div class="cinema bottom" id="bottom"></div>
<div class="cg-wrap" id="cgWrap"><img class="cg-img" id="cgImg" alt=""></div>
<script type="module" src="/src/timestop-overlay.ts"></script>
</body>
</html>
