<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Group Saves</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:rgba(31,34,48,0.95);
  --bg-soft:rgba(38,42,58,0.95);
  --border:rgba(255,255,255,0.12);
  --border-strong:rgba(255,255,255,0.20);
  --text:#e6e8ee;
  --text-dim:#9aa0b3;
  --accent:#5dade2;
  --accent-on:#7ec8f0;
  --green:#7be0a0;
}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:var(--text);font-size:12px;
}
/* Bumped border-radius from 10px → 16px to match the suite's rounder
   popover hosts (cluster uses 14px; OBR's wrapper sometimes clips at
   ~12-14px). Inset .box by 1px so the OBR host's own clipping doesn't
   eat our top/bottom edges when the host adds its own border. */
.box{
  position:absolute;inset:1px;
  background:var(--bg);
  border:1px solid var(--border-strong);
  border-radius:16px;
  box-shadow:0 8px 24px rgba(0,0,0,0.55);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.head{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px 6px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.head .ttl{
  font-size:11px;font-weight:700;
  letter-spacing:0.6px;text-transform:uppercase;
  color:var(--text);
}
.head .count{
  font-size:10.5px;color:var(--text-dim);
  font-weight:600;
  margin-left:2px;
}
.head .hint{
  margin-left:auto;
  font-size:10.5px;color:var(--text-dim);font-style:italic;
}

/* Row padding bumped to 10px so the corner buttons sit clear of the
   16px box-arc — without this, the bottom-corner buttons get a
   visible bite taken out where the box's rounded edge clips them. */
.row{
  flex:1;
  display:grid;
  grid-template-columns:repeat(6, 1fr);
  gap:5px;
  padding:8px 10px 10px;
}
.btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;color:var(--text);
  padding:5px 4px;
  transition:background .12s, border-color .12s, transform .06s;
  user-select:none;
  /* Disable native browser context menu so our right-click → suite
     popover handler is the only thing that fires. */
  -webkit-touch-callout:none;
}
.btn:hover{
  background:rgba(93,173,226,0.18);
  border-color:rgba(93,173,226,0.45);
}
.btn:active{transform:scale(0.96)}
.btn .ab{
  font-size:13px;font-weight:800;
  color:var(--accent-on);
  letter-spacing:0.4px;
  line-height:1.15;
}
.btn .lbl{
  font-size:9px;color:var(--text-dim);
  font-weight:600;
  letter-spacing:0.3px;
}

/* Brief flash when a save fires — visual confirmation that the click
   landed (the actual dice play out on canvas, but the popover stays
   open and we want a tiny ack here too). */
.btn.flash{
  background:rgba(46,204,113,0.30);
  border-color:rgba(46,204,113,0.65);
}
/* Initiative-variant buttons get adv-green / dis-red accents so they
   read as "advantage" / "disadvantage" without needing extra
   wording. Normal stays neutral. */
.btn.init-btn.adv .ab{color:#7be0a0}
.btn.init-btn.adv:hover{
  background:rgba(46,204,113,0.16);
  border-color:rgba(46,204,113,0.45);
}
.btn.init-btn.dis .ab{color:#ff8b7a}
.btn.init-btn.dis:hover{
  background:rgba(231,76,60,0.16);
  border-color:rgba(231,76,60,0.45);
}

/* HP edit row — sits below the save row in `save` mode. Input takes
   the user's number; minus/plus/set apply it to every selected
   monster's bubbles HP metadata via a single bg broadcast. */
.row-hp{
  display:flex;align-items:stretch;gap:5px;
  padding:0 10px 10px;
  flex-shrink:0;
}
.row-hp .hp-input{
  flex:0 0 56px;
  background:rgba(0,0,0,0.32);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:inherit;font-size:13px;font-weight:700;
  text-align:center;
  outline:none;
  padding:0;
}
.row-hp .hp-input::-webkit-inner-spin-button,
.row-hp .hp-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.row-hp .hp-btn{
  flex:1 1 0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-soft);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  font-family:inherit;color:var(--text);
  font-size:12px;font-weight:700;
  transition:background .12s, border-color .12s, transform .06s;
  user-select:none;
}
.row-hp .hp-btn:active{transform:scale(0.96)}
.row-hp .hp-btn.dmg{color:#ff8b7a}
.row-hp .hp-btn.dmg:hover{background:rgba(231,76,60,0.16);border-color:rgba(231,76,60,0.45)}
.row-hp .hp-btn.heal{color:#7be0a0}
.row-hp .hp-btn.heal:hover{background:rgba(46,204,113,0.16);border-color:rgba(46,204,113,0.45)}
.row-hp .hp-btn.set{color:#9ad9ff}
.row-hp .hp-btn.set:hover{background:rgba(93,173,226,0.18);border-color:rgba(93,173,226,0.45)}
.row-hp .hp-btn.flash{
  background:rgba(46,204,113,0.30);
  border-color:rgba(46,204,113,0.65);
}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <span class="ttl" id="ttl">群体豁免</span>
    <span class="count" id="count">…</span>
    <span class="hint" id="hint">左键投掷 · 右键更多</span>
  </div>
  <!-- "save" mode: 6 ability save buttons (visible by default) -->
  <div class="row" id="rowSave">
    <button class="btn" data-ab="str"><span class="ab" data-l="abStr">力量</span><span class="lbl">STR</span></button>
    <button class="btn" data-ab="dex"><span class="ab" data-l="abDex">敏捷</span><span class="lbl">DEX</span></button>
    <button class="btn" data-ab="con"><span class="ab" data-l="abCon">体质</span><span class="lbl">CON</span></button>
    <button class="btn" data-ab="int"><span class="ab" data-l="abInt">智力</span><span class="lbl">INT</span></button>
    <button class="btn" data-ab="wis"><span class="ab" data-l="abWis">感知</span><span class="lbl">WIS</span></button>
    <button class="btn" data-ab="cha"><span class="ab" data-l="abCha">魅力</span><span class="lbl">CHA</span></button>
  </div>

  <!-- "save" mode HP-edit row — type a number, then click −HP / +HP /
       =HP to subtract / add / set the value on every selected
       bestiary-bound monster's bubbles HP. Hidden in initiative
       mode (combat prep) since the GM is rolling, not editing. -->
  <div class="row-hp" id="rowHp">
    <input class="hp-input" id="hpInput" type="number" min="0" max="9999" step="1" value="10" />
    <button class="hp-btn dmg" data-hp="dmg" title="减 HP / Damage selected"><span data-l="hpDmg">−HP</span></button>
    <button class="hp-btn heal" data-hp="heal" title="加 HP / Heal selected"><span data-l="hpHeal">+HP</span></button>
    <button class="hp-btn set" data-hp="set" title="设 HP / Set selected"><span data-l="hpSet">=HP</span></button>
  </div>

  <!-- "initiative" mode: 3 variant buttons (hidden by default; the bg
       module flips display based on combat state). 优势/普通/劣势 — when
       combat is being prepared, the GM's natural multi-select gesture
       is to roll initiative for the chosen monsters, so we present
       the relevant action front-and-centre. -->
  <div class="row row-init" id="rowInit" style="display:none;grid-template-columns:repeat(3, 1fr)">
    <button class="btn init-btn adv" data-iv="adv"><span class="ab" data-l="ivAdv">优势</span><span class="lbl">ADV</span></button>
    <button class="btn init-btn normal" data-iv="normal"><span class="ab" data-l="ivNormal">普通</span><span class="lbl">NORMAL</span></button>
    <button class="btn init-btn dis" data-iv="dis"><span class="ab" data-l="ivDis">劣势</span><span class="lbl">DIS</span></button>
  </div>
</div>
<script type="module">
import OBR from "https://esm.sh/@owlbear-rodeo/sdk@3.1.0";

const BC_FIRE = "com.obr-suite/bestiary-group-save-fire";
const BC_FIRE_INIT = "com.obr-suite/bestiary-group-init-fire";
const BC_FIRE_HP = "com.obr-suite/bestiary-group-hp-fire";
const BC_STATE = "com.obr-suite/bestiary-group-save-state";
const BC_STATE_REQUEST = "com.obr-suite/bestiary-group-save-state-request";

// Layout constants must agree with src/modules/bestiary/group-saves.ts
const POPOVER_W = 360;
const POPOVER_H = 96;
const POPOVER_TOP = 95;

// Right-click context menu (reuses dice-rollable-menu.html in
// "groupSave" mode — the menu detects the param and broadcasts to
// BC_FIRE instead of the regular quick-roll channel).
//
// Build-target-aware: derive the asset base from this iframe's own
// pathname so dev (/suite-dev/) and stable (/suite/) installs each
// pull the menu HTML from their own deploy. Inline scripts in vite
// HTML entry points are NOT bundled, so import.meta.env.BASE_URL is
// unavailable here — pathname slicing is the portable fallback.
const ASSET_BASE = `${location.origin}${location.pathname.replace(/[^/]+$/, "")}`;
const MENU_URL = `${ASSET_BASE}dice-rollable-menu.html`;
const MENU_POPOVER_ID = "com.obr-suite/rollable-menu";
const MENU_W = 170;
// 4 items (no separator + no tray for group saves) ≈ 38px each + 8px paddings.
const MENU_H = 168;
const MENU_EDGE_MARGIN = 8;

// Per-client UI language (mirrors src/state.ts LS_LANG).
function readLang(){
  try { const v = localStorage.getItem("obr-suite/lang"); if (v === "en" || v === "zh") return v; } catch {}
  return "zh";
}
const T = {
  zh: {
    title: "群体豁免 / HP",
    titleInit: "群体先攻",
    hint: "左键投掷 · 右键更多",
    hintInit: "战斗准备阶段 · 1d20 + 各自敏捷调整值",
    countSel: (n) => `${n} 个目标`,
    abStr: "力量", abDex: "敏捷", abCon: "体质", abInt: "智力", abWis: "感知", abCha: "魅力",
    ivAdv: "优势", ivNormal: "普通", ivDis: "劣势",
    hpDmg: "−HP", hpHeal: "+HP", hpSet: "=HP",
  },
  en: {
    title: "Group Save / HP",
    titleInit: "Group Initiative",
    hint: "left-click roll · right-click more",
    hintInit: "Combat prep · 1d20 + each token's DEX modifier",
    countSel: (n) => `${n} targets`,
    abStr: "Str", abDex: "Dex", abCon: "Con", abInt: "Int", abWis: "Wis", abCha: "Cha",
    ivAdv: "Advantage", ivNormal: "Normal", ivDis: "Disadvantage",
    hpDmg: "−HP", hpHeal: "+HP", hpSet: "=HP",
  },
};
let currentMode = "save"; // "save" | "initiative"

function applyLang(lang) {
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  const t = T[lang];
  // Title + hint depend on the active mode (save vs initiative).
  document.getElementById("ttl").textContent =
    currentMode === "initiative" ? t.titleInit : t.title;
  document.getElementById("hint").textContent =
    currentMode === "initiative" ? t.hintInit : t.hint;
  document.querySelectorAll("[data-l]").forEach((el) => {
    const k = el.dataset.l;
    if (t[k] != null) el.textContent = t[k];
  });
}

function applyMode(mode) {
  currentMode = mode === "initiative" ? "initiative" : "save";
  const saveRow = document.getElementById("rowSave");
  const initRow = document.getElementById("rowInit");
  const hpRow = document.getElementById("rowHp");
  if (saveRow) saveRow.style.display = currentMode === "initiative" ? "none" : "grid";
  if (initRow) initRow.style.display = currentMode === "initiative" ? "grid" : "none";
  // HP edit row tags along with save mode — combat-prep mode hides
  // it so the GM isn't tempted to pre-edit HP while rolling init.
  if (hpRow) hpRow.style.display = currentMode === "initiative" ? "none" : "flex";
  applyLang(currentLang);
}

let currentLang = readLang();
applyLang(currentLang);

let lastCount = 0;

async function openContextMenu(ability, clientX, clientY) {
  // Convert iframe-local clientX/Y to OBR viewport pixel coords. The
  // popover is anchored at top-center: iframe top-left =
  // (vw/2 - W/2, POPOVER_TOP).
  const [vw, vh] = await Promise.all([
    OBR.viewport.getWidth(),
    OBR.viewport.getHeight(),
  ]);
  const iframeLeft = vw / 2 - POPOVER_W / 2;
  const iframeTop = POPOVER_TOP;
  let left = iframeLeft + clientX;
  let top = iframeTop + clientY;
  // Clamp inside viewport so the menu doesn't land off-screen near
  // the right / bottom edge.
  left = Math.max(MENU_EDGE_MARGIN, Math.min(left, vw - MENU_W - MENU_EDGE_MARGIN));
  top = Math.max(MENU_EDGE_MARGIN, Math.min(top, vh - MENU_H - MENU_EDGE_MARGIN));

  const params = new URLSearchParams();
  params.set("groupSave", "1");
  params.set("ability", ability);

  try { await OBR.popover.close(MENU_POPOVER_ID); } catch {}
  try {
    await OBR.popover.open({
      id: MENU_POPOVER_ID,
      url: `${MENU_URL}?${params.toString()}`,
      width: MENU_W,
      height: MENU_H,
      anchorReference: "POSITION",
      anchorPosition: { left: Math.round(left), top: Math.round(top) },
      anchorOrigin: { horizontal: "LEFT", vertical: "TOP" },
      transformOrigin: { horizontal: "LEFT", vertical: "TOP" },
      hidePaper: true,
      disableClickAway: false,
    });
  } catch (e) {
    console.error("[group-saves] open context menu failed", e);
  }
}

OBR.onReady(() => {
  // Receive selection state from the bg module. We use it ONLY to
  // refresh the count display — actual save firing happens server-
  // side using the bg module's cached selection (no need to round-
  // trip the data through this iframe).
  OBR.broadcast.onMessage(BC_STATE, (event) => {
    const data = event.data;
    if (!data) return;
    if (typeof data.lang === "string" && (data.lang === "en" || data.lang === "zh") && data.lang !== currentLang) {
      currentLang = data.lang;
      applyLang(currentLang);
    }
    if (typeof data.mode === "string" && data.mode !== currentMode) {
      applyMode(data.mode);
    }
    if (typeof data.count === "number") {
      lastCount = data.count;
      document.getElementById("count").textContent = T[currentLang].countSel(data.count);
    }
  });

  // Belt-and-suspenders: ask the bg module for the current state in
  // case the post-open broadcast raced ahead of our listener
  // registration here.
  OBR.broadcast.sendMessage(BC_STATE_REQUEST, {}, { destination: "LOCAL" }).catch(() => {});

  // HP-edit row — the input + 3 action buttons. Left-click on a
  // button reads the current input value, broadcasts BC_FIRE_HP with
  // the action mode and value; bg writes to every selected token's
  // bubbles HP metadata and the bars + popover stats refresh live.
  const hpInput = document.getElementById("hpInput");
  document.querySelectorAll(".row-hp .hp-btn").forEach((b) => {
    b.addEventListener("click", () => {
      const mode = b.dataset.hp;       // "dmg" | "heal" | "set"
      if (!mode) return;
      const raw = parseInt((hpInput?.value ?? "").trim(), 10);
      const value = Number.isFinite(raw) ? Math.max(0, Math.min(9999, raw)) : 0;
      if (value <= 0 && mode !== "set") return; // 0 dmg / 0 heal is a no-op
      b.classList.add("flash");
      setTimeout(() => b.classList.remove("flash"), 250);
      OBR.broadcast.sendMessage(
        BC_FIRE_HP,
        { mode, value },
        { destination: "LOCAL" },
      ).catch(() => {});
    });
  });

  document.querySelectorAll(".btn").forEach((b) => {
    // Left-click — semantics depend on which row the button lives in.
    // Save row buttons carry data-ab (str/dex/...); init row buttons
    // carry data-iv (adv/normal/dis). Each routes to its own
    // broadcast channel; the right-click context menu only applies
    // to the save row (init has its own three variants inline).
    b.addEventListener("click", () => {
      b.classList.add("flash");
      setTimeout(() => b.classList.remove("flash"), 250);
      const ab = b.dataset.ab;
      const iv = b.dataset.iv;
      if (ab) {
        OBR.broadcast.sendMessage(BC_FIRE, { ability: ab }, { destination: "LOCAL" }).catch(() => {});
      } else if (iv) {
        OBR.broadcast.sendMessage(BC_FIRE_INIT, { variant: iv }, { destination: "LOCAL" }).catch(() => {});
      }
    });
    // Right-click → open the suite's standard rollable context menu
    // in "groupSave" mode (投掷 / 暗骰 / 优势 / 劣势; no add-to-tray
    // since each token has a different per-bonus expression and the
    // tray can't represent that).
    b.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      const ab = b.dataset.ab;
      if (!ab) return;
      void openContextMenu(ab, e.clientX, e.clientY);
    });
  });
});
</script>
</body>
</html>
