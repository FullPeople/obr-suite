<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>设为骰子皮肤</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#292d3c;--bg-strong:#1f2230;--bg-card:#323748;
  --border:rgba(255,255,255,0.12);--border-strong:rgba(255,255,255,0.22);
  --text:#e6e8ee;--text-dim:#9aa0b3;--accent:#5dade2;
}
html,body{
  height:100%;width:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  color:var(--text);background:rgba(0,0,0,0.55);
  font-size:13px;
  display:flex;align-items:center;justify-content:center;
}
.card{
  width:min(420px,92vw);max-height:90vh;
  background:var(--bg);
  border:1px solid var(--border-strong);
  border-radius:10px;
  box-shadow:0 12px 36px rgba(0,0,0,0.55);
  display:flex;flex-direction:column;overflow:hidden;
}
.hdr{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.hdr .ttl{font-size:14px;font-weight:700;flex:1;letter-spacing:0.2px}
.hdr .x{
  cursor:pointer;font-size:18px;color:var(--text-dim);line-height:1;
  padding:0 4px;background:none;border:none;transition:color .12s;
}
.hdr .x:hover{color:var(--text)}
.body{
  flex:1;min-height:0;overflow-y:auto;padding:14px 16px;
  display:flex;flex-direction:column;gap:12px;
}
.body::-webkit-scrollbar{width:6px}
.body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.preview{
  display:flex;align-items:center;gap:10px;
  padding:10px;background:var(--bg-strong);
  border:1px solid var(--border);border-radius:8px;
}
.preview .thumb{
  width:56px;height:56px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.3);border-radius:6px;overflow:hidden;
}
.preview .thumb img,.preview .thumb video{
  max-width:100%;max-height:100%;object-fit:contain;
}
.preview .meta{flex:1;min-width:0}
.preview .meta .nm{
  font-size:12.5px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.preview .meta .tp{font-size:10.5px;color:var(--text-dim);margin-top:2px}
.hint{font-size:11.5px;color:var(--text-dim);line-height:1.5}
.die-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.die-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px 8px;
  background:var(--bg-card);
  border:1px solid var(--border);border-radius:8px;
  cursor:pointer;color:var(--text);font-family:inherit;
  transition:background .12s,border-color .12s,transform .08s;
}
.die-btn:hover{background:var(--bg-strong);border-color:var(--accent);transform:translateY(-1px)}
.die-btn:active{transform:scale(0.96)}
.die-btn img{
  width:36px;height:36px;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,0.5));
  -webkit-user-drag:none;
}
.die-btn .lbl{font-size:11px;font-weight:700;color:var(--text-dim)}
.die-btn:hover .lbl{color:var(--text)}
.die-btn.has-skin{border-color:rgba(93,173,226,0.45)}
.die-btn.has-skin .lbl{color:var(--accent)}
.btn-row{
  display:flex;gap:6px;padding:12px 16px;
  border-top:1px solid var(--border);flex-shrink:0;
}
.btn{
  flex:1;height:32px;border-radius:6px;
  background:var(--bg-card);color:var(--text);
  border:1px solid var(--border);font-size:12.5px;cursor:pointer;
  font-family:inherit;font-weight:600;transition:background .12s;
}
.btn:hover{background:rgba(255,255,255,0.08)}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <span class="ttl">设为我的骰子皮肤</span>
    <button class="x" id="btnX" type="button">×</button>
  </div>
  <div class="body">
    <div class="preview" id="preview"></div>
    <div class="hint">点击下面任意骰子，把这张图设为你投出该骰子时显示的皮肤。设置后全场玩家投你的骰都能看到。</div>
    <div class="die-grid" id="dieGrid"></div>
  </div>
  <div class="btn-row">
    <button class="btn" id="btnCancel" type="button">取消</button>
  </div>
</div>
<script type="module" src="/src/modules/dice/skin-picker-page.ts"></script>
</body>
</html>
