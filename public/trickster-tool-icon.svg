<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Two trickster heads peeking out from behind a low wall. Solid
       white outlines on a transparent background — pure vector,
       crisp at any toolbar size (16/24/32 px etc). Keeps the same
       motif as the on-canvas glow icon so the visual identity is
       consistent. -->

  <!-- Wall (cover) — closed rectangle. -->
  <rect x="2.5" y="14" width="19" height="7.5" rx="0.8" fill="white" fill-opacity="0.18"/>

  <!-- Right head silhouette (smaller, drawn behind so the left
       head reads on top). -->
  <path d="M14 14
           C14 11.4 15.5 9.6 17 9.6
           C18.5 9.6 20 11.4 20 14 Z"
        fill="white" fill-opacity="0.25"/>

  <!-- Left head silhouette (bigger, more visible). -->
  <path d="M5 14
           C5 10.6 7.2 8.4 9.5 8.4
           C11.8 8.4 14 10.6 14 14 Z"
        fill="white" fill-opacity="0.25"/>

  <!-- Eye whites — solid circles for unambiguous reading. -->
  <circle cx="9" cy="11.6" r="1.0" fill="white" stroke="none"/>
  <circle cx="17" cy="12" r="0.85" fill="white" stroke="none"/>
</svg>
