<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>状态追踪 · 拖拽中</title>
<!-- Noto Color Emoji loaded so the cursor-ghost label (which mirrors
     the buff name + emoji) renders newer Unicode glyphs even on
     systems with stale system emoji fonts. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --accent:#5dade2;
  --warn:#c89251;
  --red:#c0392b;
  --green:#2ecc71;
}

html,body{
  height:100%;width:100%;overflow:hidden;background:transparent;
  /* Emoji fonts FIRST so colour-emoji glyphs (💘 ⚡ 🪨 ❄️ 😶‍🌫️ etc)
     pick up Apple Color Emoji / Segoe UI Emoji / Noto Color Emoji
     before "Microsoft YaHei" or "Segoe UI" claim them as monochrome
     fallback boxes. CJK characters fall through to the system stack
     since the emoji fonts don't cover those ranges. */
  font-family:"Noto Color Emoji","Apple Color Emoji","Segoe UI Emoji","Twemoji Mozilla","EmojiOne Color",
    -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Roboto,sans-serif;
  user-select:none;
  cursor:grabbing;
}

/* Token rings — solid colors, no gradient. Visible by default with
   the suite accent blue; hover states swap to warm orange (apply) or
   red (clear / remove). */
.ring{
  position:absolute;
  border:2px dashed var(--accent);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%, -50%);
  background:transparent;
  transition:border-color .08s, background .08s, opacity .08s;
}
.ring.hover-add{
  border-color:var(--warn);
  background:rgba(200,146,81,0.18);
  border-style:solid;
}
.ring.hover-clear{
  border-color:var(--red);
  background:rgba(192,57,43,0.20);
  border-style:solid;
}
.ring.hover-remove{
  border-color:var(--red);
  background:rgba(192,57,43,0.20);
  border-style:solid;
}
.ring.applied{
  opacity:0.55;
}
/* Names hidden during drag — only the rings stay (per user request:
   keep the ring affordance, drop the name labels for cleaner drag). */
.ring .ring-name{display:none}

/* 2026-05-10 flat-modern cursor ghost — matches the palette tile
   look (no rounded corners, no border, no shadow). Background uses
   the same 80% colour-mix transparency as the palette bubble; tint
   is set inline by the JS side via `--bubble-bg`. */
.cursor-bubble{
  position:absolute;
  display:inline-flex;align-items:center;
  height:25px;padding:0 10px;
  border-radius:0;
  font-size:11px;font-weight:700;
  border:none;
  box-shadow:none;
  background:color-mix(in srgb, var(--bubble-bg, #555) 80%, transparent);
  pointer-events:none;
  transform:translate(-50%, calc(-50% - 16px));
  z-index:10;
}
.cursor-bubble.eraser{
  background:color-mix(in srgb, var(--red) 80%, transparent);
  color:#fff;
}
.cursor-bubble.manage{
  background:color-mix(in srgb, var(--warn) 80%, transparent);
  color:#fff;
}
</style>
</head>
<body>
<div id="rings"></div>
<div id="cursor" class="cursor-bubble"></div>
<script type="module" src="/src/status-tracker-capture-page.ts"></script>
</body>
</html>
