<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Dice History</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:#e6e8ee;
  font-size:12.5px;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none}

:root{
  --bg-soft:rgba(31,34,48,0.92);
  --bg-card:rgba(38,42,58,0.95);
  --bg-card-hover:rgba(50,55,75,0.98);
  --border:rgba(255,255,255,0.10);
  --border-strong:rgba(255,255,255,0.18);
  --text:#e6e8ee;
  --text-dim:#8a8e9c;
  --accent:#5dade2;
  --dm:#cda9e8;
  --dm-bg:rgba(80,40,120,0.35);
}

.box{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  background:var(--bg-soft);
  border:1px solid var(--border-strong);
  border-radius:10px;
  overflow:hidden;
  backdrop-filter:blur(8px);
  box-shadow:0 8px 24px rgba(0,0,0,0.55);
}

.head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(0,0,0,0.18);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.head-title{
  font-size:11px;font-weight:700;color:var(--text);
  text-transform:uppercase;letter-spacing:0.6px;
}
.head-empty{
  font-size:10.5px;color:var(--text-dim);font-weight:600;
}
.head-x{
  margin-left:auto;
  background:transparent;border:none;
  color:var(--text-dim);
  cursor:pointer;
  font-size:14px;line-height:1;
  width:20px;height:20px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:4px;
  font-family:inherit;
  transition:background .12s,color .12s;
}
.head-x:hover{background:rgba(255,255,255,0.10);color:var(--text)}

.rows{
  flex:1;overflow-y:auto;
  padding:6px;
  display:flex;flex-direction:column;gap:4px;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.rows::-webkit-scrollbar{width:0;height:0;display:none}

/* Each player row — fixed height ~44px, last roll inline. */
.row{
  display:flex;align-items:center;gap:8px;
  padding:7px 9px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  transition:background .12s, border-color .12s, transform .08s;
}
.row:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-strong);
  transform:translateY(-1px);
}
.row:active{transform:translateY(0) scale(0.99)}

/* DM-row gets a subtle violet border + tag */
.row.dm{
  background:linear-gradient(180deg, var(--dm-bg), var(--bg-card));
  border-color:rgba(155,89,182,0.4);
}
/* Hidden / dark-roll row gets a slightly more saturated violet tint */
.row.hidden-roll{
  background:linear-gradient(180deg, rgba(110,55,160,0.45), rgba(60,30,95,0.55));
  border-color:rgba(180,110,225,0.55);
}

.swatch{
  width:8px;height:32px;
  border-radius:3px;
  background:var(--player-color, #5dade2);
  flex-shrink:0;
}

.body{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  gap:1px;
}

.line1{
  display:flex;align-items:baseline;justify-content:space-between;
  gap:6px;
}
.player{
  font-size:12.5px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;flex:1;
}
.dm-tag{
  flex-shrink:0;
  display:inline-block;
  padding:1px 5px;
  background:rgba(155,89,182,0.55);
  border-radius:3px;
  font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;
  text-transform:uppercase;
  margin-right:4px;
}
.dark-tag{
  flex-shrink:0;
  display:inline-block;
  padding:1px 5px;
  background:rgba(120,60,180,0.7);
  border-radius:3px;
  font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;
  text-transform:uppercase;
}
.coll-tag{
  flex-shrink:0;
  display:inline-block;
  padding:1px 5px;
  background:rgba(46,204,113,0.55);
  border-radius:3px;
  font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;
  margin-right:4px;
}
/* Active replay → glow the row border in the player's color so it's
   obviously the source of the on-canvas overlay. Click again on the
   same row to dismiss. */
.row.replay-on{
  border-color:var(--player-color, #5dade2);
  box-shadow:0 0 0 1px var(--player-color, #5dade2), 0 0 12px rgba(93,173,226,0.35);
  background:linear-gradient(180deg, rgba(93,173,226,0.10), var(--bg-card));
}
.total.coll-total{
  color:#7be0a0;
  font-weight:900;
}
.ago{
  font-size:10px;color:var(--text-dim);font-weight:600;
  white-space:nowrap;flex-shrink:0;
}

/* Compact formula line — dice icons + values inline. */
.formula{
  display:flex;flex-wrap:nowrap;align-items:center;gap:4px;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
}
.die-chip{
  display:inline-flex;align-items:center;gap:2px;
  padding:1px 5px 1px 3px;
  border-radius:9px;
  background:rgba(255,255,255,0.06);
  font-family:ui-monospace,"SF Mono","JetBrains Mono",Consolas,monospace;
  font-weight:700;color:var(--text);
  font-size:10.5px;
  flex-shrink:0;
  height:18px;
}
.die-chip img{width:14px;height:14px;display:block;-webkit-user-drag:none}
.die-chip.crit{color:#ffd34d;background:rgba(255,200,0,0.16);box-shadow:0 0 6px rgba(255,200,0,0.45)}
.die-chip.fail{color:#ff8a7a;background:rgba(231,76,60,0.18)}
.die-chip.loser{opacity:0.4;text-decoration:line-through}

.mod{
  font-family:ui-monospace,monospace;font-size:11px;font-weight:700;
  color:var(--text-dim);flex-shrink:0;
}
.eq{color:var(--text-dim);flex-shrink:0;font-weight:700}
.total{
  font-family:ui-monospace,monospace;font-size:13px;font-weight:900;
  color:var(--accent);flex-shrink:0;
  margin-left:auto;
}
.label-tag{
  font-size:10px;color:var(--text-dim);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;flex:0 1 auto;
  margin-left:4px;
}

.empty{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);font-size:11.5px;
  padding:24px 12px;
  text-align:center;
}

/* === Player-details view ===
   Slides in from the right when a row is clicked. Shows that player's
   FULL history scrolling top-to-bottom. Bottom strip has a wide
   "← 返回" button. */
.detail{
  position:absolute;
  inset:0;
  display:flex;flex-direction:column;
  background:var(--bg-soft);
  transform:translateX(100%);
  transition:transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  z-index:2;
}
.detail.on{transform:translateX(0)}
/* Concurrent slide-out for the rows list — adds a hint of motion. */
.rows{transition:transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)}
.rows.shifted{transform:translateX(-32px); opacity:0.55; pointer-events:none}

.detail-head{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:rgba(0,0,0,0.22);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.detail-swatch{
  width:6px;height:18px;border-radius:3px;
  background:var(--player-color, #5dade2);
  flex-shrink:0;
}
.detail-name{
  font-size:13px;font-weight:800;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.detail-count{
  font-size:10.5px;color:var(--text-dim);font-weight:600;
  flex-shrink:0;
}

.detail-list{
  flex:1;overflow-y:auto;
  padding:6px;
  display:flex;flex-direction:column;gap:4px;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.detail-list::-webkit-scrollbar{width:0;height:0;display:none}

/* One historical entry inside the detail view — clickable to toggle
   the on-canvas replay overlay for THAT specific roll. */
.entry{
  display:flex;align-items:center;gap:8px;
  padding:6px 9px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:6px;
  cursor:pointer;
  transition:background .12s, border-color .12s, transform .08s;
}
.entry:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-strong);
}
.entry:active{transform:scale(0.99)}
.entry.crit{border-left-color:#ffcc33}
.entry.fail{border-left-color:#ff6b6b}
.entry.hidden-roll{
  background:linear-gradient(180deg, rgba(110,55,160,0.30), rgba(60,30,95,0.45));
  border-left-color:rgba(180,110,225,0.85);
}
/* Active replay → glow with the roller's color so it's obvious which
   entry's overlay is currently displayed on canvas. */
.entry.replay-on{
  border-color:var(--player-color, #5dade2);
  box-shadow:0 0 0 1px var(--player-color, #5dade2), 0 0 12px rgba(93,173,226,0.35);
  background:linear-gradient(180deg, rgba(93,173,226,0.10), var(--bg-card));
}

/* === Collective-roll container (detail view) ===
   N collective members tightly stacked under one bordered box with a
   header strip showing "集体 N · 总和 X". Click anywhere inside →
   toggle the replay overlay for the whole group. */
.coll-box{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid rgba(46,204,113,0.55);
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .12s, box-shadow .12s, background .12s;
}
.coll-box.hidden-roll{
  background:linear-gradient(180deg, rgba(110,55,160,0.30), rgba(60,30,95,0.45));
  border-left-color:rgba(180,110,225,0.85);
}
.coll-box.replay-on{
  border-color:var(--player-color, #5dade2);
  box-shadow:0 0 0 1px var(--player-color, #5dade2), 0 0 12px rgba(93,173,226,0.35);
}
.coll-head{
  display:flex;align-items:center;gap:6px;
  padding:4px 8px;
  background:rgba(46,204,113,0.10);
  border-bottom:1px solid var(--border);
  font-size:10.5px;
}
.coll-head .coll-label{
  color:var(--text-dim);font-weight:600;font-size:10.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.coll-head .coll-sum{
  font-family:ui-monospace,monospace;font-weight:900;
  color:#7be0a0;font-size:11.5px;letter-spacing:-0.3px;
  flex-shrink:0;
}
.coll-members{
  display:flex;flex-direction:column;
  gap:1px;
  padding:2px;
}
/* Tight entry rows inside a collective container — no borders, less
   padding, smaller player line. The whole group share the container's
   visual frame. */
.entry-tight{
  padding:3px 6px;
  background:transparent;
  border:0;border-left:2px solid var(--player-color, #5dade2);
  border-radius:3px;
  cursor:pointer;
}
.entry-tight:hover{background:rgba(255,255,255,0.04)}
.entry-tight .line1{font-size:10.5px}
.entry-tight .ago{font-size:9.5px}
.entry-tight .formula{font-size:10.5px}

.detail-back{
  flex-shrink:0;
  width:100%;
  background:linear-gradient(180deg, rgba(60,75,110,0.55), rgba(30,40,65,0.7));
  border:none;border-top:1px solid var(--border);
  color:#cdd9ec;font-family:inherit;font-weight:700;
  padding:10px;font-size:13px;letter-spacing:0.4px;
  cursor:pointer;
  transition:background .12s, color .12s;
}
.detail-back:hover{
  background:linear-gradient(180deg, rgba(80,100,145,0.7), rgba(40,55,85,0.85));
  color:#fff;
}
.detail-back:active{background:rgba(60,75,110,0.85)}
</style>
</head>
<body>
<div class="box">
  <div class="head">
    <span class="head-title" data-i18n="diceHistTitle">投骰记录</span>
    <span class="head-empty" id="headHint"></span>
    <button class="head-x" id="btnDismiss" type="button" data-i18n-title="diceHistDismissTitle" title="隐藏到下次投骰">×</button>
  </div>
  <div class="rows" id="rows">
    <div class="empty" data-i18n="diceHistEmpty">还没人投骰</div>
  </div>
  <!-- Slide-in detail view for one player's full history. Hidden by
       default; toggled with .on by JS. -->
  <div class="detail" id="detail">
    <div class="detail-head">
      <div class="detail-swatch" id="detailSwatch"></div>
      <div class="detail-name" id="detailName" data-i18n="diceHistPlayer">玩家</div>
      <div class="detail-count" id="detailCount"></div>
    </div>
    <div class="detail-list" id="detailList"></div>
    <button class="detail-back" id="detailBack" type="button" data-i18n="diceHistBack">← 返回</button>
  </div>
</div>
<script type="module" src="/src/modules/dice/history-page.ts"></script>
</body>
</html>
