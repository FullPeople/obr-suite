<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Dice History</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  height:100%;width:100%;
  overflow:hidden;
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:#e6e8ee;
  font-size:12.5px;
}
html::-webkit-scrollbar,body::-webkit-scrollbar{width:0;height:0;display:none}

:root{
  --bg-soft:rgba(31,34,48,0.92);
  --bg-card:rgba(38,42,58,0.95);
  --bg-card-hover:rgba(50,55,75,0.98);
  --border:rgba(255,255,255,0.10);
  --border-strong:rgba(255,255,255,0.18);
  --text:#e6e8ee;
  --text-dim:#8a8e9c;
  --accent:#5dade2;
  --dm:#cda9e8;
  --dm-bg:rgba(80,40,120,0.35);
}

.box{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  background:transparent;
  border:0;
  border-radius:0;
  overflow:hidden;
  box-shadow:none;
}

.head{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(0,0,0,0.18);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  gap:6px;
}

/* Drag grip — small dotted icon left of the title. Pointer events route
   through panelDrag.ts; release broadcasts the offset to dice/index.ts
   which re-anchors the popover. */
.drag-handle{
  flex-shrink:0;
  width:14px;height:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  color:rgba(255,255,255,0.30);
  opacity:0.55;
  transition:opacity .12s, color .12s;
  touch-action:none;user-select:none;
}
.drag-handle:hover{opacity:1;color:rgba(255,255,255,0.85)}
.drag-handle.is-dragging{cursor:grabbing;opacity:1;color:#5dade2}
.drag-handle svg{width:12px;height:12px;display:block;pointer-events:none}
.head-title{
  font-size:11px;font-weight:700;color:var(--text);
  text-transform:uppercase;letter-spacing:0.6px;
}
.head-empty{
  font-size:10.5px;color:var(--text-dim);font-weight:600;
}
.head-x{
  margin-left:auto;
  background:transparent;border:none;
  color:var(--text-dim);
  cursor:pointer;
  font-size:14px;line-height:1;
  width:20px;height:20px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:4px;
  font-family:inherit;
  transition:background .12s,color .12s;
}
.head-x:hover{background:rgba(255,255,255,0.10);color:var(--text)}

/* Rows render bottom-up: newest at the BOTTOM, oldest at the top.
   `flex-direction: column-reverse` + DOM order (newest-first from
   `latestPerPlayer()`) gives chat-window semantics — the bottom is
   anchored, and overflowing items get pushed off the TOP rather than
   the bottom. overflow:auto lets the user wheel-scroll up to peek at
   older players, but the scrollbar is hidden so there's no visible
   gutter. */
.rows{
  flex:1;overflow-y:auto;
  padding:6px;
  display:flex;flex-direction:column-reverse;gap:4px;
  justify-content:flex-start;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.rows::-webkit-scrollbar{width:0;height:0;display:none}

/* Each player row — fixed height ~44px, last roll inline. */
.row{
  display:flex;align-items:center;gap:8px;
  padding:7px 9px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  transition:background .12s, border-color .12s, transform .08s;
}
.row:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-strong);
  transform:translateY(-1px);
}
.row:active{transform:translateY(0) scale(0.99)}

/* DM-row gets a subtle violet border + tag */
.row.dm{
  background:linear-gradient(180deg, var(--dm-bg), var(--bg-card));
  border-color:rgba(155,89,182,0.4);
}
/* Hidden / dark-roll row gets a slightly more saturated violet tint */
.row.hidden-roll{
  background:linear-gradient(180deg, rgba(110,55,160,0.45), rgba(60,30,95,0.55));
  border-color:rgba(180,110,225,0.55);
}

.swatch{
  width:8px;height:32px;
  border-radius:3px;
  background:var(--player-color, #5dade2);
  flex-shrink:0;
}

.body{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  gap:1px;
}

.line1{
  display:flex;align-items:baseline;justify-content:space-between;
  gap:6px;
}
.player{
  font-size:12.5px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;flex:1;
}
.dm-tag{
  flex-shrink:0;
  display:inline-block;
  padding:1px 5px;
  background:rgba(155,89,182,0.55);
  border-radius:3px;
  font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;
  text-transform:uppercase;
  margin-right:4px;
}
.dark-tag{
  flex-shrink:0;
  display:inline-block;
  padding:1px 5px;
  background:rgba(120,60,180,0.7);
  border-radius:3px;
  font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;
  text-transform:uppercase;
}
.coll-tag{
  flex-shrink:0;
  display:inline-block;
  padding:1px 5px;
  background:rgba(46,204,113,0.55);
  border-radius:3px;
  font-size:9px;font-weight:800;
  color:#fff;letter-spacing:0.4px;
  margin-right:4px;
}
/* Active replay → glow the row border in the player's color so it's
   obviously the source of the on-canvas overlay. Click again on the
   same row to dismiss. */
.row.replay-on{
  border-color:var(--player-color, #5dade2);
  box-shadow:0 0 0 1px var(--player-color, #5dade2), 0 0 12px rgba(93,173,226,0.35);
  background:linear-gradient(180deg, rgba(93,173,226,0.10), var(--bg-card));
}
.total.coll-total{
  color:#7be0a0;
  font-weight:900;
}
.ago{
  font-size:10px;color:var(--text-dim);font-weight:600;
  white-space:nowrap;flex-shrink:0;
}

/* Compact formula line — dice icons + values inline. */
/* Two-row layout: a flex-wrapping dice list on the left, total pinned
   to the right edge no matter how many lines the dice take. The dice
   list itself is a separate flex container so it can wrap freely
   (each chip is shrink-prevented), while the outer .formula keeps the
   total aligned to the right baseline. */
.formula{
  display:flex;
  align-items:flex-end;
  gap:6px;
  font-size:11px;
}
.dice-list{
  flex:1 1 auto;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:4px;
  min-width:0;
  /* Each die-chip is flex-shrink:0 so it never compresses; wrapping
     is the only escape valve when the row gets crowded. */
}
.die-chip{
  display:inline-flex;align-items:center;gap:2px;
  padding:1px 5px 1px 3px;
  border-radius:9px;
  background:rgba(255,255,255,0.06);
  font-family:ui-monospace,"SF Mono","JetBrains Mono",Consolas,monospace;
  font-weight:700;color:var(--text);
  font-size:10.5px;
  flex-shrink:0;
  height:18px;
}
.die-chip img{width:14px;height:14px;display:block;-webkit-user-drag:none}
.die-chip.crit{color:#ffd34d;background:rgba(255,200,0,0.16);box-shadow:0 0 6px rgba(255,200,0,0.45)}
.die-chip.fail{color:#ff8a7a;background:rgba(231,76,60,0.18)}
.die-chip.loser{opacity:0.4;text-decoration:line-through}
/* Subtraction dice — half-opacity so they read as "deducted" from
   the total. Mirrors the effect-modal's `.dice.subtract` styling. */
.die-chip.subtract{opacity:0.55}

.mod{
  font-family:ui-monospace,monospace;font-size:11px;font-weight:700;
  color:var(--text-dim);flex-shrink:0;
}
.eq{color:var(--text-dim);flex-shrink:0;font-weight:700}
.total{
  font-family:ui-monospace,monospace;font-size:13px;font-weight:900;
  color:var(--accent);flex-shrink:0;
  /* margin-left:auto removed — .total is now a sibling of .dice-list
     inside .formula, so it naturally sits at the right edge with the
     dice-list filling the remaining flex space. */
}
.label-tag{
  font-size:10px;color:var(--text-dim);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;flex:0 1 auto;
  margin-left:4px;
}

.empty{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  color:var(--text-dim);font-size:11.5px;
  padding:24px 12px;
  text-align:center;
}

/* === Player-details view ===
   Slides in from the right when a row is clicked. Shows that player's
   FULL history scrolling top-to-bottom. Bottom strip has a wide
   "← 返回" button. */
.detail{
  position:absolute;
  inset:0;
  display:flex;flex-direction:column;
  background:var(--bg-soft);
  transform:translateX(100%);
  transition:transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  z-index:2;
}
.detail.on{transform:translateX(0)}
/* Concurrent slide-out for the rows list — adds a hint of motion. */
.rows{transition:transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)}
.rows.shifted{transform:translateX(-32px); opacity:0.55; pointer-events:none}

.detail-head{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:rgba(0,0,0,0.22);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.detail-swatch{
  width:6px;height:18px;border-radius:3px;
  background:var(--player-color, #5dade2);
  flex-shrink:0;
}
.detail-name{
  font-size:13px;font-weight:800;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  flex:1;min-width:0;
}
.detail-count{
  font-size:10.5px;color:var(--text-dim);font-weight:600;
  flex-shrink:0;
}

.detail-list{
  flex:1;overflow-y:auto;
  padding:6px;
  display:flex;flex-direction:column;gap:4px;
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.detail-list::-webkit-scrollbar{width:0;height:0;display:none}

/* One historical entry inside the detail view — clickable to toggle
   the on-canvas replay overlay for THAT specific roll. */
.entry{
  display:flex;align-items:center;gap:8px;
  padding:6px 9px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:6px;
  cursor:pointer;
  transition:background .12s, border-color .12s, transform .08s;
}
.entry:hover{
  background:var(--bg-card-hover);
  border-color:var(--border-strong);
}
.entry:active{transform:scale(0.99)}
.entry.crit{border-left-color:#ffcc33}
.entry.fail{border-left-color:#ff6b6b}
.entry.hidden-roll{
  background:linear-gradient(180deg, rgba(110,55,160,0.30), rgba(60,30,95,0.45));
  border-left-color:rgba(180,110,225,0.85);
}
/* Active replay → glow with the roller's color so it's obvious which
   entry's overlay is currently displayed on canvas. */
.entry.replay-on{
  border-color:var(--player-color, #5dade2);
  box-shadow:0 0 0 1px var(--player-color, #5dade2), 0 0 12px rgba(93,173,226,0.35);
  background:linear-gradient(180deg, rgba(93,173,226,0.10), var(--bg-card));
}

/* === Collective-roll member strip ===
   Used in BOTH the popover row (each player's latest collective) and
   the detail view (the player's full history). Every member of a
   collective is rendered as its own small pill-shaped box; the whole
   strip wraps when there are too many to fit on one line. No
   aggregate total — the user wanted each token's roll to stand on
   its own. */
.member-strip{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:4px;
  margin-top:2px;
  /* In a wrap-friendly flex container the member-cards never compress
     — they keep their natural width and overflow to a new row. */
}
.member-card{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:2px 7px 2px 4px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  white-space:nowrap;
  flex-shrink:0;
  font-size:10.5px;
  /* Card itself is non-clickable — clicks bubble to the .row /
     .coll-entry parent which owns the gesture (open detail / fire
     replay respectively). Hover effect is just a hint. */
  transition:background .12s, border-color .12s;
}
.member-card:hover{
  background:rgba(93,173,226,0.14);
  border-color:rgba(93,173,226,0.32);
}
.member-card.crit{
  background:rgba(255,200,0,0.14);
  border-color:rgba(255,200,0,0.42);
}
.member-card.fail{
  background:rgba(231,76,60,0.14);
  border-color:rgba(231,76,60,0.40);
}
.member-card.hidden-roll{
  background:rgba(155,89,182,0.18);
  border-color:rgba(180,110,225,0.45);
}
/* Inside a member-card the dice chips are no longer their own
   visual pills — the card IS the pill. Strip backgrounds + padding
   from nested chips so they read as plain text/icon next to each
   other. */
.member-card .die-chip{
  background:transparent;
  border-radius:0;
  padding:0;
  height:auto;
  font-size:10px;
}
.member-card .die-chip img{
  width:13px;height:13px;
}
.member-card .mod{font-size:10px}
.member-card .eq{font-size:10px;color:var(--text-dim)}
.member-card .total{
  font-family:ui-monospace,monospace;
  font-size:11.5px;
  font-weight:900;
  color:var(--accent);
  margin-left:2px;
}
.member-card.crit .total{color:#ffd34d}
.member-card.fail .total{color:#ff8a7a}

/* === Repeat strip — two modes ===
   `is-flow`  : horizontal wrap (used in the latest-per-player popover
                row — same in-row footprint as a collective strip).
   `is-stack` : vertical stack (used in the detail / clicked-popup
                view where the user wants each iteration to read as
                its own line).
   Both share the same .member-card styling so the visual vocabulary
   matches collective member-cards exactly. */
.repeat-strip{
  display:flex;
  align-items:center;
  gap:3px;
  margin-top:2px;
}
.repeat-strip.is-flow{
  flex-direction:row;
  flex-wrap:wrap;
}
.repeat-strip.is-stack{
  flex-direction:column;
  align-items:flex-start;
}
.repeat-strip .member-card{
  /* Slight left-pad so the iteration index reads as a label rather
     than running into the dice chips. */
  padding-left:4px;
}
.repeat-idx{
  font-size:9.5px;
  color:var(--text-dim);
  font-weight:700;
  min-width:18px;
  text-align:right;
  margin-right:2px;
}

/* === Collective entry in detail view ===
   Same .entry frame as a solo entry (so click → replay works through
   the existing .entry handler), but with a green left border to
   visually mark "this is a collective" and a member-strip body
   instead of a single .formula. */
.coll-entry{
  border-left-color:rgba(46,204,113,0.55);
}

.detail-back{
  flex-shrink:0;
  width:100%;
  background:linear-gradient(180deg, rgba(60,75,110,0.55), rgba(30,40,65,0.7));
  border:none;border-top:1px solid var(--border);
  color:#cdd9ec;font-family:inherit;font-weight:700;
  padding:10px;font-size:13px;letter-spacing:0.4px;
  cursor:pointer;
  transition:background .12s, color .12s;
}
.detail-back:hover{
  background:linear-gradient(180deg, rgba(80,100,145,0.7), rgba(40,55,85,0.85));
  color:#fff;
}
.detail-back:active{background:rgba(60,75,110,0.85)}

/* Per-entry progress bar — sits at the very top of an entry; width
   shrinks from 100% → 0 over PROGRESS_DURATION_MS, after which the
   row is removed from history. Animation is JS-driven (transform
   scaleX) so it survives DOM detach/attach without restarting. */
.row-progress{
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:rgba(93,173,226,0.18);
  overflow:hidden;
  border-radius:8px 8px 0 0;
  pointer-events:none;
}
.row-progress-fill{
  position:absolute;top:0;right:0;
  height:100%;
  width:100%;
  background:linear-gradient(90deg, rgba(93,173,226,0.55), rgba(127,195,235,0.95));
  transform-origin:right center;
  transform:scaleX(1);
  transition:transform 0.1s linear;
  /* Shrinks right→left so the leftmost edge is the "current time"
     marker — matches the user's "right-to-left" spec. */
}
.row{position:relative}

/* Bottom-right drag handle — small horizontal pill matching the
   user's spec ("a small horizontal button at the bottom-right"). */
.bottom-drag-grip{
  position:absolute;
  bottom:4px;right:4px;
  display:inline-flex;align-items:center;justify-content:center;
  height:12px;width:32px;
  background:rgba(31,34,48,0.72);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:6px;
  color:rgba(255,255,255,0.55);
  cursor:grab;
  touch-action:none;user-select:none;
  transition:color .12s, background .12s;
  z-index:5;
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.bottom-drag-grip:hover{color:#fff;background:rgba(50,55,75,0.92)}
.bottom-drag-grip.is-dragging{cursor:grabbing;color:#5dade2}
.bottom-drag-grip svg{width:18px;height:8px;display:block;pointer-events:none}
</style>
</head>
<body>
<div class="box">
  <div class="rows" id="rows">
    <div class="empty" data-i18n="diceHistEmpty">还没人投骰</div>
  </div>
  <!-- Slide-in detail view for one player's full history. Hidden by
       default; toggled with .on by JS. -->
  <div class="detail" id="detail">
    <div class="detail-head">
      <div class="detail-swatch" id="detailSwatch"></div>
      <div class="detail-name" id="detailName" data-i18n="diceHistPlayer">玩家</div>
      <div class="detail-count" id="detailCount"></div>
    </div>
    <div class="detail-list" id="detailList"></div>
    <button class="detail-back" id="detailBack" type="button" data-i18n="diceHistBack">← 返回</button>
  </div>
  <!-- Bottom-right drag grip — moves the whole dice-history popover.
       Special-cased per the user's spec: small horizontal pill in
       the corner instead of a side-anchored grip. -->
  <div class="bottom-drag-grip" id="drag-handle" title="拖动 / Drag" aria-label="拖动投骰记录面板">
    <svg viewBox="0 0 18 8" aria-hidden="true">
      <circle cx="3" cy="2" r="1" fill="currentColor"/><circle cx="9" cy="2" r="1" fill="currentColor"/><circle cx="15" cy="2" r="1" fill="currentColor"/>
      <circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="9" cy="6" r="1" fill="currentColor"/><circle cx="15" cy="6" r="1" fill="currentColor"/>
    </svg>
  </div>
</div>
<script type="module" src="/src/modules/dice/history-page.ts"></script>
</body>
</html>
